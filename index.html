<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Programme sport</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f5;
      --surface: #ffffff;
      --surface-soft: #eef3ef;
      --surface-strong: #e4ece6;
      --text: #171b1f;
      --muted: #66707a;
      --line: #d9e0da;
      --accent: #157c65;
      --accent-soft: #dff4eb;
      --accent-strong: #0f5f4d;
      --warning: #9a650e;
      --danger: #b83a3a;
      --shadow: 0 16px 36px rgba(32, 45, 37, .10);
      --radius: 8px;
      --nav-height: 74px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(21, 124, 101, .12), transparent 26rem),
        linear-gradient(180deg, #fbfcfa, var(--bg) 64%, #eef1ed);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    input {
      width: 100%;
      min-height: 46px;
      padding: .72rem .78rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(21, 124, 101, .12);
    }

    input[readonly] {
      color: var(--muted);
      background: var(--surface-soft);
    }

    label {
      display: grid;
      gap: .35rem;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.25;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .app {
      width: min(1000px, 100%);
      margin: 0 auto;
      padding: 1rem 1rem calc(var(--nav-height) + 1rem);
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 0 -1rem 1rem;
      padding: .8rem 1rem;
      border-bottom: 1px solid rgba(23, 27, 31, .08);
      background: rgba(251, 252, 250, .9);
      backdrop-filter: blur(16px);
    }

    .top strong {
      display: block;
      font-size: 1rem;
    }

    .top span {
      color: var(--muted);
      font-size: .78rem;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .hero {
      display: grid;
      gap: .8rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #ffffff, #eef6f1);
      box-shadow: var(--shadow);
    }

    .hero h1 {
      max-width: 13ch;
      font-size: clamp(1.6rem, 8vw, 2.35rem);
      line-height: 1;
    }

    .hero p {
      color: var(--muted);
      line-height: 1.45;
    }

    .grid {
      display: grid;
      gap: .8rem;
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin: 1.15rem 0 .65rem;
    }

    .section-title h2 {
      font-size: 1.06rem;
    }

    .muted,
    .fine {
      color: var(--muted);
    }

    .fine {
      font-size: .82rem;
      line-height: 1.45;
    }

    .card {
      padding: .9rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 10px 24px rgba(32, 45, 37, .08);
    }

    .session-card,
    .week-card {
      display: grid;
      gap: .65rem;
      text-align: left;
      color: inherit;
      width: 100%;
    }

    .session-card:hover,
    .week-card:hover,
    .week-card.current {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(21, 124, 101, .10);
    }

    .session-head,
    .exercise-head,
    .progress-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: .8rem;
    }

    .sport-icon {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--accent-soft);
      font-size: 1.25rem;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: .42rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: .36rem .55rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: .78rem;
      white-space: nowrap;
    }

    .pill.good {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 800;
    }

    .pill.warn {
      color: var(--warning);
      border-color: rgba(154, 101, 14, .3);
      background: #fff6df;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      padding: .8rem .95rem;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-weight: 850;
    }

    .btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn.danger {
      background: var(--danger);
      color: white;
    }

    .exercise {
      display: grid;
      gap: .75rem;
      padding: .9rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr .75fr;
      gap: .55rem;
      align-items: end;
    }

    .activity-fields {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: .55rem;
      align-items: end;
    }

    .notice {
      padding: .8rem;
      border: 1px solid rgba(21, 124, 101, .22);
      border-radius: var(--radius);
      background: var(--accent-soft);
      color: var(--text);
      line-height: 1.45;
    }

    .empty {
      padding: 1.1rem;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
      background: rgba(255, 255, 255, .6);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: .55rem;
    }

    .stat {
      display: grid;
      gap: .18rem;
      min-height: 74px;
      align-content: center;
      padding: .7rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .stat small {
      color: var(--muted);
      font-size: .72rem;
    }

    .stat strong {
      font-size: 1.12rem;
      line-height: 1.1;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      padding: .65rem;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: var(--surface-soft);
      font-size: .78rem;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      padding: .45rem .7rem calc(.45rem + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(23, 27, 31, .08);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(16px);
    }

    .bottom-nav-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      width: min(560px, 100%);
      margin: 0 auto;
    }

    .nav-btn {
      min-height: 56px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-weight: 850;
    }

    .nav-btn.active {
      color: #fff;
      background: var(--accent);
    }

    .actions {
      position: sticky;
      bottom: calc(var(--nav-height) + .7rem);
      z-index: 4;
      padding-top: .5rem;
      background: linear-gradient(180deg, transparent, var(--bg) 28%);
    }

    @media (max-width: 430px) {
      .fields,
      .activity-fields,
      .summary {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 760px) {
      .app {
        padding-inline: 1.4rem;
      }

      .top {
        margin-inline: -1.4rem;
        padding-inline: 1.4rem;
      }

      .hero {
        grid-template-columns: 1fr 1fr;
        align-items: end;
      }

      .sessions-grid,
      .progress-grid,
      .week-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .btn {
        width: auto;
      }
    }

    @media (min-width: 1040px) {
      .week-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <strong>Programme sport</strong>
      <span>Semaines 2026, séances simples, progression lisible</span>
    </header>

    <main>
      <section class="view active" id="view-session"></section>
      <section class="view" id="view-progress"></section>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Navigation">
    <div class="bottom-nav-inner">
      <button class="nav-btn active" type="button" data-tab="session">Séance</button>
      <button class="nav-btn" type="button" data-tab="progress">Progression</button>
    </div>
  </nav>

  <script>
    const STORAGE_KEY = "programmeSportSimple.v2";
    const PROGRAM_START = new Date(2026, 4, 25);
    const PROGRAM_LAST_WEEK_START = new Date(2026, 11, 28);

    const SESSIONS = [
      {
        id: "upperA",
        type: "strength",
        icon: "🏋️‍♀️🏃",
        name: "Haut du corps A + course qualitative",
        duration: "55 à 60 min + 25 à 30 min course",
        focus: "Dos, épaules, bras, abdos anti-rotation",
        note: "La course qualitative se fait après la musculation.",
        exercises: [
          exercise("latPulldown", "Lat pulldown", 3, "25 kg", 8, "8 à 12"),
          exercise("seatedRow", "Seated row", 3, "20 kg", 8, "8 à 12"),
          exercise("chestPress", "Chest press machine", 3, "à calibrer", 8, "8 à 12"),
          exercise("shoulderPress", "Shoulder press machine", 3, "7,5 kg", 8, "8 à 12"),
          exercise("facePull", "Seated face pull", 3, "17,5 kg", 12, "12 à 15"),
          exercise("cableCurls", "Cable curls", 3, "7,5 kg", 10, "10 à 15"),
          exercise("cableCrunch", "Cable crunch", 3, "à calibrer", 10, "10 à 15")
        ]
      },
      {
        id: "lowerA",
        type: "strength",
        icon: "🏋️‍♀️",
        name: "Bas du corps A",
        duration: "60 à 70 min",
        focus: "Fessiers et quadriceps",
        note: "Séance prioritaire pour la recomposition.",
        exercises: [
          exercise("hipThrustA", "Machine or barbell hip thrust", 4, "à calibrer", 8, "8 à 12"),
          exercise("legPress", "Leg press", 3, "à calibrer", 8, "8 à 12"),
          exercise("bulgarianSplitSquat", "Bulgarian split squat or lunges", 3, "à calibrer", 8, "8 à 10 par jambe"),
          exercise("legExtension", "Leg extension", 3, "à calibrer", 10, "10 à 15"),
          exercise("abductionA", "Abduction machine", 3, "à calibrer", 15, "15 à 20"),
          exercise("calves", "Calf raises", 3, "à calibrer", 10, "10 à 15"),
          exercise("cableCrunch", "Cable crunch", 3, "à calibrer", 10, "10 à 15")
        ]
      },
      {
        id: "upperB",
        type: "strength",
        icon: "🏋️‍♀️🏃",
        name: "Haut du corps B + course facile",
        duration: "55 à 60 min + 25 à 30 min course",
        focus: "Épaules, dos, pectoraux, triceps, abdos",
        note: "La course facile reste en aisance respiratoire après la musculation.",
        exercises: [
          exercise("shoulderPress", "Shoulder press machine", 3, "7,5 kg", 8, "8 à 12"),
          exercise("inclineChestPress", "Chest press or incline press machine", 3, "à calibrer", 8, "8 à 12"),
          exercise("latPulldown", "Lat pulldown", 3, "25 kg", 10, "10 à 12"),
          exercise("seatedRow", "Seated row", 3, "20 kg", 10, "10 à 12"),
          exercise("lateralRaise", "Lateral raises", 3, "à calibrer", 12, "12 à 20"),
          exercise("tricepsPulley", "Cable triceps pushdown", 3, "à calibrer", 10, "10 à 15"),
          exercise("cableCrunch", "Cable crunch", 3, "à calibrer", 10, "10 à 15")
        ]
      },
      {
        id: "lowerB",
        type: "strength",
        icon: "🏋️‍♀️",
        name: "Bas du corps B",
        duration: "60 à 70 min",
        focus: "Fessiers, ischios et chaîne postérieure",
        note: "Séance prioritaire, progression graduelle.",
        exercises: [
          exercise("romanianDeadlift", "Dumbbell Romanian deadlift", 3, "à calibrer", 8, "8 à 10"),
          exercise("hipThrustB", "Hip thrust or glute bridge", 3, "à calibrer", 10, "10 à 12"),
          exercise("legCurl", "Leg curl", 3, "à calibrer", 10, "10 à 15"),
          exercise("cableKickback", "Cable kickback", 3, "à calibrer", 12, "12 à 15 par jambe"),
          exercise("backExtension", "Back extension", 3, "à calibrer", 10, "10 à 15"),
          exercise("abductionB", "Abduction machine", 3, "à calibrer", 15, "15 à 20"),
          exercise("cableCrunch", "Cable crunch", 3, "à calibrer", 10, "10 à 15")
        ]
      },
      {
        id: "swim50",
        type: "activity",
        icon: "🏊",
        name: "Natation",
        duration: "50 min",
        focus: "Technique, respiration, endurance douce",
        note: "Note simplement la durée, la distance estimée et le ressenti.",
        defaults: { duration: "50", distance: "", effort: "" }
      },
      {
        id: "bike30",
        type: "activity",
        icon: "🚴",
        name: "Vélo",
        duration: "30 min",
        focus: "Cardio facile à modéré",
        note: "Séance courte : garde une intensité compatible avec la récupération.",
        defaults: { duration: "30", distance: "", effort: "" }
      }
    ];

    function exercise(id, name, sets, defaultWeight, defaultReps, repRange) {
      return { id, name, sets, defaultWeight, defaultReps, repRange };
    }

    function createDefaultData() {
      return {
        selectedWeekId: "",
        selectedSessionId: "",
        currentEntries: {},
        history: [],
        lastSavedAt: ""
      };
    }

    const weeks = generateWeeks();
    let data = loadData();
    let activeTab = "session";
    let sessionScreen = "weeks";

    function loadData() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return { ...createDefaultData(), ...(saved || {}) };
      } catch (error) {
        return createDefaultData();
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function addDays(date, amount) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + amount);
      return copy;
    }

    function toIsoDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatShortDate(date) {
      return date.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" });
    }

    function generateWeeks() {
      const list = [];
      let current = new Date(PROGRAM_START);
      let index = 1;
      while (current <= PROGRAM_LAST_WEEK_START) {
        const start = new Date(current);
        const end = addDays(start, 6);
        end.setHours(23, 59, 59, 999);
        const id = toIsoDate(start);
        list.push({
          id,
          index,
          start,
          end,
          label: `Semaine ${index}`,
          range: `${formatShortDate(start)} au ${formatShortDate(end)}`
        });
        current = addDays(current, 7);
        index += 1;
      }
      return list;
    }

    function getCurrentProgramWeek() {
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      return weeks.find(week => now >= week.start && now <= week.end);
    }

    function getSelectedWeek() {
      return weeks.find(week => week.id === data.selectedWeekId);
    }

    function getSession(sessionId) {
      return SESSIONS.find(session => session.id === sessionId);
    }

    function today() {
      return toIsoDate(new Date());
    }

    function downloadJson(payload, filename) {
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function openExportEmail(payload, filename) {
      const subject = `Export donnees sport - ${today()}`;
      const shortPayload = payload.length <= 1400;
      const body = [
        "Bonjour,",
        "",
        "Voici mon export de donnees sport.",
        shortPayload
          ? `Donnees JSON :\n\n${payload}`
          : `Le fichier ${filename} vient d'etre telecharge. Il faut l'ajouter en piece jointe a cet email.`,
        "",
        "Note : l'application conserve les donnees localement dans le navigateur."
      ].join("\n");

      window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }

    function exportDataByEmail() {
      const payload = JSON.stringify(data, null, 2);
      const filename = `progression-sport-${today()}.json`;
      downloadJson(payload, filename);
      window.setTimeout(() => openExportEmail(payload, filename), 150);
    }

    function makeId() {
      return window.crypto && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function numericWeight(value) {
      const normalized = String(value ?? "").replace(",", ".").replace(/[^\d.]/g, "");
      const parsed = Number(normalized);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function numericValue(value) {
      const parsed = Number(String(value ?? "").replace(",", ".").match(/\d+(\.\d+)?/)?.[0] || 0);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function entryFor(exercise) {
      if (!data.currentEntries[exercise.id]) {
        data.currentEntries[exercise.id] = {
          weight: exercise.defaultWeight,
          reps: String(exercise.defaultReps)
        };
      }
      return data.currentEntries[exercise.id];
    }

    function activityEntryFor(session) {
      if (!data.currentEntries.activity) {
        data.currentEntries.activity = { ...session.defaults };
      }
      return data.currentEntries.activity;
    }

    function selectWeek(weekId) {
      data.selectedWeekId = weekId;
      data.selectedSessionId = "";
      data.currentEntries = {};
      sessionScreen = "sessions";
      saveData();
      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function selectSession(sessionId) {
      data.selectedSessionId = sessionId;
      data.currentEntries = {};
      sessionScreen = "form";
      saveData();
      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function saveWorkout() {
      const session = getSession(data.selectedSessionId);
      const week = getSelectedWeek();
      if (!session || !week) return;

      const record = {
        id: makeId(),
        date: today(),
        weekId: week.id,
        weekLabel: `${week.label} · ${week.range}`,
        sessionId: session.id,
        sessionName: session.name,
        icon: session.icon,
        type: session.type,
        exercises: [],
        activity: null
      };

      if (session.type === "strength") {
        record.exercises = session.exercises.map(item => {
          const entry = entryFor(item);
          return {
            id: item.id,
            name: item.name,
            sets: item.sets,
            reps: entry.reps,
            weight: entry.weight,
            repRange: item.repRange
          };
        });
      } else {
        const entry = activityEntryFor(session);
        record.activity = {
          duration: entry.duration,
          distance: entry.distance,
          effort: entry.effort
        };
      }

      data.history.unshift(record);
      data.lastSavedAt = new Date().toISOString();
      data.currentEntries = {};
      data.selectedSessionId = "";
      sessionScreen = "sessions";
      activeTab = "progress";
      saveData();
      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderAll() {
      renderSession();
      renderProgress();
      updateNav();
    }

    function renderSession() {
      let html = "";
      if (sessionScreen === "weeks" || !data.selectedWeekId) {
        html = renderWeekPicker();
      } else if (sessionScreen === "form" && data.selectedSessionId) {
        html = renderWorkoutForm(getSession(data.selectedSessionId));
      } else {
        html = renderSessionPicker();
      }
      document.querySelector("#view-session").innerHTML = html;
      bindSessionEvents();
    }

    function renderWeekPicker() {
      const currentWeek = getCurrentProgramWeek();
      return `
        <section class="hero">
          <div>
            <div class="pill-row">
              <span class="pill good">Départ 25/05/2026</span>
              <span class="pill">${weeks.length} semaines</span>
            </div>
            <h1>Choisis la semaine</h1>
          </div>
          <p>L’application commence par le planning de semaines. Clique sur une semaine pour choisir ensuite la séance à faire.</p>
        </section>

        <div class="section-title">
          <h2>Semaines 2026</h2>
          <span class="fine">Jusqu’à la dernière semaine de 2026</span>
        </div>

        <section class="grid week-grid">
          ${weeks.map(week => {
            const count = data.history.filter(record => record.weekId === week.id).length;
            const isCurrent = currentWeek?.id === week.id;
            return `
              <button class="card week-card ${isCurrent ? "current" : ""}" type="button" data-select-week="${week.id}">
                <div class="session-head">
                  <div>
                    <strong>${week.label}</strong>
                    <p class="fine">${week.range}</p>
                  </div>
                  ${isCurrent ? `<span class="pill good">En cours</span>` : `<span class="pill">${count} séance${count > 1 ? "s" : ""}</span>`}
                </div>
                ${isCurrent && count ? `<p class="fine">${count} séance${count > 1 ? "s" : ""} déjà sauvegardée${count > 1 ? "s" : ""} cette semaine.</p>` : ""}
              </button>
            `;
          }).join("")}
        </section>
      `;
    }

    function renderSessionPicker() {
      const week = getSelectedWeek();
      return `
        <section class="hero">
          <div>
            <button class="btn secondary" type="button" id="backToWeeks">Retour aux semaines</button>
            <div style="height:.75rem"></div>
            <div class="pill-row">
              <span class="pill good">${week?.label || ""}</span>
              <span class="pill">${week?.range || ""}</span>
            </div>
            <h1>Choisis ta séance</h1>
          </div>
          <p>Les icônes donnent le sport d’un coup d’œil : musculation, course, natation ou vélo.</p>
        </section>

        <div class="section-title">
          <h2>Séances proposées</h2>
          <span class="fine">Sans indication de jour</span>
        </div>

        <section class="grid sessions-grid">
          ${SESSIONS.map(session => `
            <button class="card session-card" type="button" data-select-session="${session.id}">
              <div class="session-head">
                <div>
                  <strong>${session.name}</strong>
                  <p class="fine">${session.focus}</p>
                </div>
                <span class="sport-icon" aria-hidden="true">${session.icon}</span>
              </div>
              <div class="pill-row">
                <span class="pill">${session.duration}</span>
                <span class="pill">${session.type === "strength" ? `${session.exercises.length} exos` : "cardio"}</span>
              </div>
              <p class="fine">${session.note}</p>
            </button>
          `).join("")}
        </section>
      `;
    }

    function renderWorkoutForm(session) {
      if (!session) return renderSessionPicker();
      return session.type === "strength" ? renderStrengthForm(session) : renderActivityForm(session);
    }

    function renderStrengthForm(session) {
      const week = getSelectedWeek();
      return `
        <section class="hero">
          <div>
            <button class="btn secondary" type="button" id="backToSessions">Retour aux séances</button>
            <div style="height:.75rem"></div>
            <div class="pill-row">
              <span class="pill good">${week?.label || ""}</span>
              <span class="pill">${session.icon} ${session.duration}</span>
            </div>
            <h1>${session.name}</h1>
          </div>
          <p>${session.note}</p>
        </section>

        <div class="section-title">
          <h2>Exercices</h2>
          <span class="fine">Poids · reps · séries</span>
        </div>

        <section class="grid">
          ${session.exercises.map(item => {
            const entry = entryFor(item);
            return `
              <article class="exercise">
                <div class="exercise-head">
                  <div>
                    <strong>${item.name}</strong>
                    <p class="fine">Fourchette recommandée : ${item.repRange}</p>
                  </div>
                </div>
                <div class="fields">
                  <label>Poids
                    <input data-exercise="${item.id}" data-field="weight" value="${escapeHtml(entry.weight)}">
                  </label>
                  <label>Reps
                    <input data-exercise="${item.id}" data-field="reps" value="${escapeHtml(entry.reps)}">
                  </label>
                  <label>Séries
                    <input value="${item.sets}" readonly aria-label="Nombre de séries">
                  </label>
                </div>
              </article>
            `;
          }).join("")}
        </section>

        <div class="actions">
          <button class="btn" type="button" id="saveWorkout">Sauvegarder la séance</button>
        </div>
      `;
    }

    function renderActivityForm(session) {
      const week = getSelectedWeek();
      const entry = activityEntryFor(session);
      return `
        <section class="hero">
          <div>
            <button class="btn secondary" type="button" id="backToSessions">Retour aux séances</button>
            <div style="height:.75rem"></div>
            <div class="pill-row">
              <span class="pill good">${week?.label || ""}</span>
              <span class="pill">${session.icon} ${session.duration}</span>
            </div>
            <h1>${session.name}</h1>
          </div>
          <p>${session.note}</p>
        </section>

        <div class="section-title">
          <h2>Suivi simple</h2>
          <span class="fine">Durée · distance · ressenti</span>
        </div>

        <section class="exercise">
          <div class="activity-fields">
            <label>Durée réelle
              <input data-activity-field="duration" value="${escapeHtml(entry.duration)}" placeholder="minutes">
            </label>
            <label>Distance
              <input data-activity-field="distance" value="${escapeHtml(entry.distance)}" placeholder="m, km ou longueurs">
            </label>
            <label>Ressenti /10
              <input data-activity-field="effort" value="${escapeHtml(entry.effort)}" placeholder="ex. 6">
            </label>
          </div>
        </section>

        <div class="actions">
          <button class="btn" type="button" id="saveWorkout">Sauvegarder la séance</button>
        </div>
      `;
    }

    function bindSessionEvents() {
      document.querySelectorAll("[data-select-week]").forEach(button => {
        button.addEventListener("click", () => selectWeek(button.dataset.selectWeek));
      });

      document.querySelectorAll("[data-select-session]").forEach(button => {
        button.addEventListener("click", () => selectSession(button.dataset.selectSession));
      });

      document.querySelector("#backToWeeks")?.addEventListener("click", () => {
        sessionScreen = "weeks";
        data.selectedSessionId = "";
        data.currentEntries = {};
        saveData();
        renderAll();
      });

      document.querySelector("#backToSessions")?.addEventListener("click", () => {
        sessionScreen = "sessions";
        data.selectedSessionId = "";
        data.currentEntries = {};
        saveData();
        renderAll();
      });

      document.querySelectorAll("[data-exercise]").forEach(input => {
        input.addEventListener("input", event => {
          const id = event.currentTarget.dataset.exercise;
          const field = event.currentTarget.dataset.field;
          if (!data.currentEntries[id]) data.currentEntries[id] = {};
          data.currentEntries[id][field] = event.currentTarget.value;
          saveData();
        });
      });

      document.querySelectorAll("[data-activity-field]").forEach(input => {
        input.addEventListener("input", event => {
          if (!data.currentEntries.activity) data.currentEntries.activity = {};
          data.currentEntries.activity[event.currentTarget.dataset.activityField] = event.currentTarget.value;
          saveData();
        });
      });

      document.querySelector("#saveWorkout")?.addEventListener("click", saveWorkout);
    }

    function renderProgress() {
      const stats = getProgressStats();
      const selectedWeek = getSelectedWeek();
      document.querySelector("#view-progress").innerHTML = `
        <section class="hero">
          <div>
            <div class="pill-row">
              <span class="pill good">${data.history.length} séance${data.history.length > 1 ? "s" : ""}</span>
              <span class="pill">${stats.exerciseCount} exercice${stats.exerciseCount > 1 ? "s" : ""}</span>
              <span class="pill">${stats.activityCount} cardio</span>
            </div>
            <h1>Progression</h1>
          </div>
          <p>Chaque sauvegarde est liée à une semaine. Les charges progressent exercice par exercice, les séances cardio restent lisibles dans l’historique.</p>
        </section>

        ${data.lastSavedAt ? `<section class="notice" style="margin-top:1rem">Dernière séance sauvegardée : ${new Date(data.lastSavedAt).toLocaleString("fr-FR")}${selectedWeek ? ` · semaine active : ${selectedWeek.label}` : ""}.</section>` : ""}

        <div class="section-title">
          <h2>Résumé</h2>
          <span class="fine">Données locales</span>
        </div>
        <section class="summary">
          <div class="stat"><small>Séances</small><strong>${data.history.length}</strong></div>
          <div class="stat"><small>Dernière</small><strong>${data.history[0] ? `${data.history[0].icon || ""} ${data.history[0].sessionName}` : "-"}</strong></div>
          <div class="stat"><small>Volume max</small><strong>${stats.bestVolume ? Math.round(stats.bestVolume) : "-"}</strong></div>
        </section>

        <div class="section-title">
          <h2>Musculation</h2>
          <span class="fine">Dernière charge et tendance</span>
        </div>
        <section class="grid progress-grid">
          ${stats.exercises.length ? stats.exercises.map(renderExerciseProgress).join("") : `<div class="empty">Aucun exercice sauvegardé pour le moment.</div>`}
        </section>

        <div class="section-title">
          <h2>Cardio</h2>
          <span class="fine">Natation et vélo</span>
        </div>
        <section class="grid progress-grid">
          ${stats.activities.length ? stats.activities.map(renderActivityProgress).join("") : `<div class="empty">Aucune séance natation ou vélo sauvegardée pour le moment.</div>`}
        </section>

        <div class="section-title">
          <h2>Historique</h2>
          <span class="fine">Séances récentes</span>
        </div>
        <section class="card grid">
          ${data.history.length ? renderHistoryTable() : `<div class="empty">L’historique apparaîtra ici après la première sauvegarde.</div>`}
          <button class="btn secondary" type="button" id="exportData">Exporter les données</button>
          <button class="btn danger" type="button" id="resetData">Réinitialiser</button>
        </section>
      `;
      bindProgressEvents();
    }

    function getProgressStats() {
      const exerciseMap = new Map();
      const activityMap = new Map();
      let bestVolume = 0;

      [...data.history].reverse().forEach(record => {
        (record.exercises || []).forEach(item => {
          if (!exerciseMap.has(item.id)) {
            exerciseMap.set(item.id, {
              id: item.id,
              name: item.name,
              first: item,
              last: item,
              bestWeight: numericWeight(item.weight),
              bestVolume: 0,
              count: 0,
              records: []
            });
          }

          const current = exerciseMap.get(item.id);
          const weight = numericWeight(item.weight);
          const reps = numericValue(item.reps);
          const volume = weight * reps * Number(item.sets || 0);

          current.last = item;
          current.bestWeight = Math.max(current.bestWeight, weight);
          current.bestVolume = Math.max(current.bestVolume, volume);
          current.count += 1;
          current.records.push({ date: record.date, weekLabel: record.weekLabel || "Non classée", sessionName: record.sessionName, ...item, volume });
          bestVolume = Math.max(bestVolume, volume);
        });

        if (record.activity) {
          if (!activityMap.has(record.sessionId)) {
            activityMap.set(record.sessionId, {
              id: record.sessionId,
              icon: record.icon || "",
              name: record.sessionName,
              first: record.activity,
              last: record.activity,
              count: 0,
              bestDuration: 0,
              bestDistance: 0
            });
          }
          const current = activityMap.get(record.sessionId);
          current.last = record.activity;
          current.count += 1;
          current.bestDuration = Math.max(current.bestDuration, numericValue(record.activity.duration));
          current.bestDistance = Math.max(current.bestDistance, numericValue(record.activity.distance));
        }
      });

      const exercises = [...exerciseMap.values()].sort((a, b) => a.name.localeCompare(b.name, "fr"));
      const activities = [...activityMap.values()].sort((a, b) => a.name.localeCompare(b.name, "fr"));
      return { exercises, activities, exerciseCount: exercises.length, activityCount: activities.length, bestVolume };
    }

    function renderExerciseProgress(item) {
      const firstWeight = numericWeight(item.first.weight);
      const lastWeight = numericWeight(item.last.weight);
      const diff = lastWeight - firstWeight;
      const trend = diff > 0 ? `+${diff.toLocaleString("fr-FR")} kg` : diff < 0 ? `${diff.toLocaleString("fr-FR")} kg` : "stable";
      const trendClass = diff > 0 ? "good" : diff < 0 ? "warn" : "";

      return `
        <article class="card grid">
          <div class="progress-head">
            <div>
              <strong>${item.name}</strong>
              <p class="fine">${item.count} relevé${item.count > 1 ? "s" : ""}</p>
            </div>
            <span class="pill ${trendClass}">${trend}</span>
          </div>
          <div class="summary">
            <div class="stat"><small>Dernier poids</small><strong>${escapeHtml(item.last.weight)}</strong></div>
            <div class="stat"><small>Dernières reps</small><strong>${escapeHtml(item.last.reps)}</strong></div>
            <div class="stat"><small>Séries</small><strong>${item.last.sets}</strong></div>
          </div>
          <div class="notice">
            Meilleure charge notée : <strong>${item.bestWeight ? `${item.bestWeight.toLocaleString("fr-FR")} kg` : escapeHtml(item.last.weight)}</strong>.
            ${item.bestVolume ? `Meilleur volume estimé : <strong>${Math.round(item.bestVolume)}</strong>.` : ""}
          </div>
        </article>
      `;
    }

    function renderActivityProgress(item) {
      return `
        <article class="card grid">
          <div class="progress-head">
            <div>
              <strong>${item.icon} ${item.name}</strong>
              <p class="fine">${item.count} séance${item.count > 1 ? "s" : ""}</p>
            </div>
            <span class="pill good">${escapeHtml(item.last.duration || "-")} min</span>
          </div>
          <div class="summary">
            <div class="stat"><small>Dernière durée</small><strong>${escapeHtml(item.last.duration || "-")}</strong></div>
            <div class="stat"><small>Dernière distance</small><strong>${escapeHtml(item.last.distance || "-")}</strong></div>
            <div class="stat"><small>Ressenti</small><strong>${escapeHtml(item.last.effort || "-")}</strong></div>
          </div>
          <div class="notice">Meilleure durée notée : <strong>${item.bestDuration || "-"} min</strong>${item.bestDistance ? ` · distance max : <strong>${item.bestDistance}</strong>` : ""}.</div>
        </article>
      `;
    }

    function renderHistoryTable() {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Semaine</th>
                <th>Date</th>
                <th>Séance</th>
                <th>Détail</th>
              </tr>
            </thead>
            <tbody>
              ${data.history.slice(0, 24).map(record => `
                <tr>
                  <td>${escapeHtml(record.weekLabel || "Non classée")}</td>
                  <td>${record.date}</td>
                  <td>${escapeHtml(`${record.icon || ""} ${record.sessionName}`)}</td>
                  <td>${renderRecordDetail(record)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderRecordDetail(record) {
      if (record.activity) {
        return `Durée : ${escapeHtml(record.activity.duration || "-")} min · Distance : ${escapeHtml(record.activity.distance || "-")} · Ressenti : ${escapeHtml(record.activity.effort || "-")}/10`;
      }
      return (record.exercises || [])
        .map(item => `${escapeHtml(item.name)} : ${escapeHtml(item.weight)}, ${escapeHtml(item.reps)} reps, ${item.sets} séries`)
        .join("<br>");
    }

    function bindProgressEvents() {
      document.querySelector("#exportData")?.addEventListener("click", exportDataByEmail);

      document.querySelector("#resetData")?.addEventListener("click", () => {
        if (confirm("Réinitialiser toutes les séances sauvegardées ?")) {
          data = createDefaultData();
          sessionScreen = "weeks";
          saveData();
          renderAll();
        }
      });
    }

    function updateNav() {
      document.querySelectorAll(".view").forEach(view => view.classList.remove("active"));
      document.querySelector(`#view-${activeTab}`).classList.add("active");
      document.querySelectorAll(".nav-btn").forEach(button => {
        button.classList.toggle("active", button.dataset.tab === activeTab);
      });
    }

    document.querySelectorAll("[data-tab]").forEach(button => {
      button.addEventListener("click", () => {
        activeTab = button.dataset.tab;
        updateNav();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    renderAll();
  </script>
</body>
</html>
