<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Training Program</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f5;
      --surface: #ffffff;
      --surface-soft: #eef3ef;
      --surface-strong: #e4ece6;
      --text: #171b1f;
      --muted: #66707a;
      --line: #d9e0da;
      --accent: #157c65;
      --accent-soft: #dff4eb;
      --accent-strong: #0f5f4d;
      --warning: #9a650e;
      --danger: #b83a3a;
      --shadow: 0 16px 36px rgba(32, 45, 37, .10);
      --radius: 8px;
      --nav-height: 74px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(21, 124, 101, .12), transparent 26rem),
        linear-gradient(180deg, #fbfcfa, var(--bg) 64%, #eef1ed);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      padding: .72rem .78rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(21, 124, 101, .12);
    }

    input[readonly],
    select:disabled {
      color: var(--muted);
      background: var(--surface-soft);
    }

    input[type="checkbox"] {
      width: 1.2rem;
      min-height: auto;
      accent-color: var(--accent);
    }

    label {
      display: grid;
      gap: .35rem;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.25;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .app {
      width: min(1000px, 100%);
      margin: 0 auto;
      padding: 1rem 1rem calc(var(--nav-height) + 1rem);
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 0 -1rem 1rem;
      padding: .8rem 1rem;
      border-bottom: 1px solid rgba(23, 27, 31, .08);
      background: rgba(251, 252, 250, .9);
      backdrop-filter: blur(16px);
    }

    .top strong {
      display: block;
      font-size: 1rem;
    }

    .top span {
      color: var(--muted);
      font-size: .78rem;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .hero {
      display: grid;
      gap: .8rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #ffffff, #eef6f1);
      box-shadow: var(--shadow);
    }

    .hero h1 {
      max-width: 13ch;
      font-size: clamp(1.6rem, 8vw, 2.35rem);
      line-height: 1;
    }

    .hero p {
      color: var(--muted);
      line-height: 1.45;
    }

    .grid {
      display: grid;
      gap: .8rem;
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin: 1.15rem 0 .65rem;
    }

    .section-title h2 {
      font-size: 1.06rem;
    }

    .muted,
    .fine {
      color: var(--muted);
    }

    .fine {
      font-size: .82rem;
      line-height: 1.45;
    }

    .card {
      padding: .9rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 10px 24px rgba(32, 45, 37, .08);
    }

    .session-card,
    .week-card,
    .overview-day {
      display: grid;
      gap: .65rem;
      text-align: left;
      color: inherit;
      width: 100%;
    }

    .session-card {
      cursor: pointer;
    }

    .session-card:hover,
    .week-card:hover,
    .week-card.current,
    .session-card:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(21, 124, 101, .10);
      outline: none;
    }

    .session-card.done {
      border-color: rgba(21, 124, 101, .45);
      background: linear-gradient(135deg, #ffffff, var(--accent-soft));
    }

    .exercise.done {
      border-color: rgba(21, 124, 101, .35);
      background: #eef3ef;
      opacity: .78;
    }

    .exercise.done .notice {
      background: #e5ece7;
      border-color: var(--line);
    }

    .exercise.done input:not([type="checkbox"]) {
      color: var(--muted);
      background: #e8eee9;
    }

    .session-head,
    .exercise-head,
    .progress-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: .8rem;
    }

    .day-index {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 850;
      font-size: .88rem;
    }

    .sport-icon {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--accent-soft);
      font-size: 1.25rem;
      line-height: 1;
      overflow: hidden;
      text-align: center;
    }

    .sport-icon > span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      line-height: 1;
    }

    .sport-icon.combo {
      width: 46px;
      height: 46px;
      font-size: 1rem;
    }

    .done-check {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: .42rem;
      min-height: 36px;
      color: var(--text);
      font-size: .84rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .exercise-check {
      justify-content: flex-start;
      margin-top: .25rem;
    }

    .history-actions {
      display: flex;
      flex-wrap: wrap;
      gap: .45rem;
      min-width: 150px;
    }

    .history-actions .btn {
      width: auto;
      min-height: 40px;
      padding: .55rem .7rem;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: .42rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: .36rem .55rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: .78rem;
      white-space: nowrap;
    }

    .pill.good {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 800;
    }

    .pill.warn {
      color: var(--warning);
      border-color: rgba(154, 101, 14, .3);
      background: #fff6df;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      padding: .8rem .95rem;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-weight: 850;
    }

    .btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn.danger {
      background: var(--danger);
      color: white;
    }

    .exercise {
      display: grid;
      gap: .75rem;
      padding: .9rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr .75fr;
      gap: .55rem;
      align-items: end;
    }

    .activity-fields {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: .55rem;
      align-items: end;
    }

    .health-fields {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: .55rem;
      align-items: end;
    }

    .notice {
      padding: .8rem;
      border: 1px solid rgba(21, 124, 101, .22);
      border-radius: var(--radius);
      background: var(--accent-soft);
      color: var(--text);
      line-height: 1.45;
    }

    .progress-bar {
      position: relative;
      width: 100%;
      height: .7rem;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-strong);
    }

    .progress-bar span {
      display: block;
      width: var(--value, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #50b58e);
      transition: width .2s ease;
    }

    .progress-bar.segmented span {
      position: absolute;
      top: 0;
      height: 100%;
    }

    .progress-bar.segmented .progress-core {
      left: 0;
      width: var(--core, 0%);
      background: linear-gradient(90deg, var(--accent), #50b58e);
    }

    .progress-bar.segmented .progress-optional {
      left: var(--optional-left, 0%);
      width: var(--optional, 0%);
      background: linear-gradient(90deg, #d8952d, #f0bd66);
    }

    .progress-bar.segmented .progress-overflow {
      right: 0;
      width: var(--overflow, 0%);
      background: repeating-linear-gradient(
        135deg,
        #d8952d 0,
        #d8952d 5px,
        #f3c87a 5px,
        #f3c87a 10px
      );
    }

    .calendar-card {
      display: grid;
      gap: .75rem;
      margin-bottom: 1rem;
    }

    .calendar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
    }

    .calendar-nav {
      display: inline-flex;
      gap: .4rem;
      flex: 0 0 auto;
    }

    .calendar-nav .btn {
      width: 44px;
      min-height: 40px;
      padding: 0;
      font-size: 1.1rem;
    }

    .calendar-nav .today-btn {
      width: auto;
      padding: 0 .65rem;
      font-size: .82rem;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: .35rem;
    }

    .calendar-weekday {
      color: var(--muted);
      font-size: .7rem;
      font-weight: 850;
      text-align: center;
      text-transform: uppercase;
    }

    .calendar-day {
      display: grid;
      align-content: start;
      gap: .28rem;
      min-height: 64px;
      padding: .42rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .calendar-day.empty-day {
      border-style: dashed;
      background: rgba(255, 255, 255, .45);
    }

    .calendar-day.today {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(21, 124, 101, .10);
    }

    .calendar-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      color: var(--text);
      font-size: .78rem;
      font-weight: 850;
    }

    .calendar-day.today .calendar-number {
      color: #fff;
      background: var(--accent);
    }

    .calendar-icons {
      display: flex;
      flex-wrap: wrap;
      gap: .18rem;
    }

    .calendar-icon,
    .calendar-more {
      display: inline-grid;
      place-items: center;
      min-width: 22px;
      height: 22px;
      padding: 0 .12rem;
      border-radius: 999px;
      background: var(--accent-soft);
      font-size: .82rem;
      line-height: 1;
    }

    .calendar-more {
      color: var(--accent-strong);
      font-size: .68rem;
      font-weight: 850;
    }

    .empty {
      padding: 1.1rem;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
      background: rgba(255, 255, 255, .6);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: .55rem;
    }

    .compact-summary {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .compact-summary .stat {
      min-height: 58px;
      padding: .55rem .42rem;
      text-align: center;
    }

    .compact-summary .stat strong {
      font-size: .98rem;
      overflow-wrap: anywhere;
    }

    .chart-card {
      display: grid;
      gap: .75rem;
    }

    .chart-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .stat {
      display: grid;
      gap: .18rem;
      min-height: 74px;
      align-content: center;
      padding: .7rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .stat small {
      color: var(--muted);
      font-size: .72rem;
    }

    .stat strong {
      font-size: 1.12rem;
      line-height: 1.1;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      padding: .65rem;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: var(--surface-soft);
      font-size: .78rem;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      padding: .45rem .7rem calc(.45rem + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(23, 27, 31, .08);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(16px);
    }

    .bottom-nav-inner {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .5rem;
      width: min(560px, 100%);
      margin: 0 auto;
    }

    .nav-btn {
      min-height: 56px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-weight: 850;
    }

    .nav-btn.active {
      color: #fff;
      background: var(--accent);
    }

    .actions {
      position: sticky;
      bottom: calc(var(--nav-height) + .7rem);
      z-index: 4;
      padding-top: .5rem;
      background: linear-gradient(180deg, transparent, var(--bg) 28%);
    }

    @media (max-width: 430px) {
      .fields,
      .activity-fields,
      .health-fields,
      .summary {
        grid-template-columns: 1fr;
      }

      .compact-summary {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: .35rem;
      }

      .compact-summary .stat small {
        font-size: .66rem;
      }

      .compact-summary .stat strong {
        font-size: .88rem;
      }
    }

    @media (min-width: 760px) {
      .app {
        padding-inline: 1.4rem;
      }

      .top {
        margin-inline: -1.4rem;
        padding-inline: 1.4rem;
      }

      .hero {
        grid-template-columns: 1fr 1fr;
        align-items: end;
      }

      .sessions-grid,
      .progress-grid,
      .overview-grid,
      .week-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .btn {
        width: auto;
      }
    }

    @media (min-width: 1040px) {
      .week-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main>
      <section class="view active" id="view-overview"></section>
      <section class="view" id="view-session"></section>
      <section class="view" id="view-progress"></section>
      <section class="view" id="view-health"></section>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Navigation">
    <div class="bottom-nav-inner">
      <button class="nav-btn active" type="button" data-tab="overview">Overview</button>
      <button class="nav-btn" type="button" data-tab="session">Session</button>
      <button class="nav-btn" type="button" data-tab="progress">Progress</button>
      <button class="nav-btn" type="button" data-tab="health">Health</button>
    </div>
  </nav>

  <script>

    const PROGRAM_START = new Date(2026, 4, 25);

    const ACTIVITY_PROGRESSIONS = {

    function addDays(date, amount) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + amount);
      return copy;
    }

    function toIsoDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatShortDate(date) {
      return date.toLocaleDateString("en-GB", { day: "2-digit", month: "2-digit" });
    }

    function generateWeeks() {
      const list = [];
      let current = new Date(PROGRAM_START);
      let index = 1;
      while (current <= PROGRAM_LAST_WEEK_START) {
        const start = new Date(current);
        const end = addDays(start, 6);
        end.setHours(23, 59, 59, 999);
        const id = toIsoDate(start);
        list.push({
          id,
          index,
          start,
          end,
          label: `Week ${index}`,
          range: `${formatShortDate(start)} to ${formatShortDate(end)}`
        });
        current = addDays(current, 7);
        index += 1;
      }
      return list;
    }

    function getCurrentProgramWeek() {
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      return weeks.find(week => now >= week.start && now <= week.end);

    function hydrateCompletionFromHistory() {
      if (data.completionHydrated) return;
      data.completed = data.completed || {};
      data.history.forEach(record => {
        if (record.weekId && record.sessionId) {
          markSessionDone(record.weekId, record.sessionId, true, false);
        }
      });
      data.completionHydrated = true;
      saveData();
    }

    function markSessionDone(weekId, sessionId, done, persist = true) {
      data.completed = data.completed || {};
      if (!data.completed[weekId]) data.completed[weekId] = {};
      if (done) data.completed[weekId][sessionId] = true;
      else delete data.completed[weekId][sessionId];
      if (persist) saveData();
    }

    function isSessionDone(weekId, sessionId) {
      return Boolean(data.completed?.[weekId]?.[sessionId]);
    }

    function getWeekCompletion(weekId) {
      const total = getCoreSessions().length;
      const coreIds = new Set(getCoreSessions().map(session => session.id));
      const records = data.history.filter(record => record.weekId === weekId && record.sessionId);
      const completedSet = new Set(Object.entries(data.completed?.[weekId] || {})
        .filter(([, done]) => done)
        .map(([sessionId]) => sessionId));
      const recordCounts = records.reduce((map, record) => {
        map[record.sessionId] = (map[record.sessionId] || 0) + 1;
        completedSet.add(record.sessionId);
        return map;
      }, {});
      const extraSessions = Object.values(recordCounts).reduce((sum, count) => sum + Math.max(0, count - 1), 0);
      const coreDone = [...completedSet].filter(sessionId => coreIds.has(sessionId)).length;
      const optionalDone = [...completedSet].filter(sessionId => !coreIds.has(sessionId)).length + extraSessions;
      const remainingCoreSlots = Math.max(0, total - coreDone);
      const optionalWithinTarget = Math.min(optionalDone, remainingCoreSlots);
      const optionalOverflow = Math.max(0, optionalDone - optionalWithinTarget);
      const done = coreDone + optionalDone;
      return {
        done,
        total,
        complete: done >= total,
        percent: total ? Math.min(100, Math.round((done / total) * 100)) : 0,
        coreDone,
        optionalDone,
        corePercent: total ? Math.min(100, Math.round((coreDone / total) * 100)) : 0,
        optionalPercent: total ? Math.min(100, Math.round((optionalWithinTarget / total) * 100)) : 0,
        optionalOverflowPercent: total ? Math.min(100, Math.round((optionalOverflow / total) * 100)) : 0
      };
    }

    function renderWeeklyProgressBar(completion, label = "Week progress") {
      const corePercent = Number(completion.corePercent || 0);

      return `
        <div class="progress-bar segmented" aria-label="${escapeHtml(label)}">
          <span class="progress-core" style="--core:${corePercent}%"></span>
          <span class="progress-optional" style="--optional-left:${corePercent}%;--optional:${optionalPercent}%"></span>
          ${overflowPercent ? `<span class="progress-overflow" style="--overflow:${overflowPercent}%"></span>` : ""}
        </div>
      `;
    }

    function getSessionSummaryCounts() {
      const counts = Object.fromEntries(SESSIONS.map(session => [session.id, 0]));
      weeks.forEach(week => {
        const completedSet = new Set(Object.entries(data.completed?.[week.id] || {})
          .filter(([, done]) => done)
          .map(([sessionId]) => sessionId));
        const recordCounts = data.history
          .filter(record => record.weekId === week.id && record.sessionId)
          .reduce((map, record) => {
            map[record.sessionId] = (map[record.sessionId] || 0) + 1;
            completedSet.add(record.sessionId);
            return map;
          }, {});

        completedSet.forEach(sessionId => {
          if (counts[sessionId] !== undefined) counts[sessionId] += 1;
        });
        Object.entries(recordCounts).forEach(([sessionId, count]) => {
          if (counts[sessionId] !== undefined) counts[sessionId] += Math.max(0, count - 1);
        });
      });
      return counts;
    }

    function getWeeklyMuscleVolume(weekId) {
      const totals = Object.fromEntries(MUSCLE_TARGETS.map(muscle => [muscle.id, 0]));
      const records = data.history.filter(record => record.weekId === weekId);
      const savedSessionIds = new Set(records.map(record => record.sessionId));
      const addExerciseSets = item => {
        const muscles = EXERCISE_MUSCLES[item.id] || {};
        Object.entries(muscles).forEach(([muscleId, share]) => {
          totals[muscleId] = (totals[muscleId] || 0) + Number(item.sets || 0) * share;
        });
      };

      records.forEach(record => (record.exercises || []).forEach(addExerciseSets));
      SESSIONS
        .filter(session => session.type === "strength" && isSessionDone(weekId, session.id) && !savedSessionIds.has(session.id))
        .forEach(session => session.exercises.forEach(addExerciseSets));

      return MUSCLE_TARGETS.map(target => {
        const sets = Number((totals[target.id] || 0).toFixed(1));
        return {
          ...target,
          sets,
          percent: Math.min(100, Math.round((sets / target.max) * 100)),
          status: sets < target.min ? "Low" : sets <= target.max ? "Productive" : "High"
        };
      });
    }

    function makeId() {

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function numericWeight(value) {
      const normalized = String(value ?? "").replace(",", ".").replace(/[^\d.]/g, "");
      const parsed = Number(normalized);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function formatDecimalComma(value) {
      if (!Number.isFinite(value)) return "";
      return Number(value.toFixed(2)).toString().replace(".", ",");
    }

    function normalizeWeightInput(value) {
      const raw = String(value ?? "").replace(".", ",").replace(/[^\d,]/g, "");
      const parts = raw.split(",");
      if (parts.length <= 1) return parts[0] || "";
      return `${parts[0]},${parts.slice(1).join("")}`;
    }

    function displayLoadWithUnit(value, emptyText = "-") {
      const normalized = normalizeWeightInput(value);
      return normalized ? `${normalized} kg` : emptyText;
    }

    function displaySpeedWithUnit(value, emptyText = "-") {
      const normalized = normalizeWeightInput(value);
      return normalized ? `${normalized} km/h` : emptyText;
    }

    function renderHrZoneOptions(selectedValue = "") {
      const selected = String(selectedValue || "");
      const values = selected && !HR_ZONES.includes(selected) ? [selected, ...HR_ZONES] : HR_ZONES;
      return values.map(zone => `<option value="${escapeHtml(zone)}" ${zone === selected ? "selected" : ""}>${escapeHtml(zone)}</option>`).join("");
    }

    function numericValue(value) {
      const parsed = Number(String(value ?? "").replace(",", ".").match(/\d+(\.\d+)?/)?.[0] || 0);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function parseRepRange(repRange) {
      const values = String(repRange || "").match(/\d+(\.\d+)?/g)?.map(Number) || [];
      return { min: values[0] || 8, max: values[1] || values[0] || 12 };
    }

    function getExerciseLogs(exerciseId) {
      return [...data.history]
        .reverse()
        .flatMap(record => (record.exercises || [])
          .filter(item => item.id === exerciseId)
          .map(item => ({ ...item, date: record.date, weekId: record.weekId })))
        .filter(item => numericWeight(item.weight) > 0 && numericValue(item.reps) > 0);
    }

    function estimateOneRepMax(weight, reps) {
      return weight * (1 + reps / 30);
    }

    function classifyExerciseForLoad(exerciseId) {
      if (["hipThrustA", "hipThrustB", "legPress", "bulgarianSplitSquat", "romanianDeadlift"].includes(exerciseId)) return "lower";
      if (["latPulldown", "seatedRow", "chestPress", "shoulderPress", "inclineChestPress"].includes(exerciseId)) return "upper";
      if (["deadBug", "sidePlank"].includes(exerciseId)) return "bodyweight";
      return "isolation";
    }

    function roundToLoadStep(value, step) {
      if (!step || !Number.isFinite(value)) return value;
      return Math.max(step, Math.round(value / step) * step);
    }

    function formatLoad(value) {
      if (!Number.isFinite(value) || value <= 0) return "";
      return formatDecimalComma(value);
    }

    function formatPercent(value) {
      if (!Number.isFinite(value)) return "-";
      return `${formatDecimalComma(value)}%`;
    }

    function emptyHealthDraft() {
      return { date: today(), totalWeight: "", fatWeight: "", muscleWeight: "" };
    }

    function getHealthDraft() {
      if (!data.healthDraft) data.healthDraft = emptyHealthDraft();
      data.healthDraft.totalWeight = normalizeWeightInput(data.healthDraft.totalWeight);
      data.healthDraft.fatWeight = normalizeWeightInput(data.healthDraft.fatWeight);
      data.healthDraft.muscleWeight = normalizeWeightInput(data.healthDraft.muscleWeight);
      return data.healthDraft;
    }

    function getSortedHealthMeasurements() {
      return [...(data.health || [])].sort((a, b) => {
        const dateCompare = String(a.date || "").localeCompare(String(b.date || ""));
        if (dateCompare) return dateCompare;
        return String(a.createdAt || "").localeCompare(String(b.createdAt || ""));
      });
    }

    function calculateHealthPercentages(measurement) {
      const total = numericWeight(measurement?.totalWeight);
      const fat = numericWeight(measurement?.fatWeight);
      const muscle = numericWeight(measurement?.muscleWeight);
      return {
        fatPercent: total > 0 && fat > 0 ? (fat / total) * 100 : NaN,
        musclePercent: total > 0 && muscle > 0 ? (muscle / total) * 100 : NaN
      };
    }

    function suggestNextLoad(exercise) {
      const logs = getExerciseLogs(exercise.id);
      const defaultWeight = exercise.defaultWeight;
      const range = parseRepRange(exercise.repRange);
      const step = LOAD_STEP_RULES[classifyExerciseForLoad(exercise.id)] ?? 1.25;

      if (!logs.length) {
        return {
          weight: defaultWeight,
          title: "Start here",
          detail: defaultWeight
            ? `No previous data yet. Use ${displayLoadWithUnit(defaultWeight)}, aim for ${exercise.repRange}, and save the session.`
            : `No previous data yet. Enter a load in kg, aim for ${exercise.repRange}, and save the session.`
        };
      }

      const last = logs[logs.length - 1];
      const lastWeight = numericWeight(last.weight);
      const lastReps = numericValue(last.reps);
      const e1rm = estimateOneRepMax(lastWeight, lastReps);
      const recent = logs.slice(-3);
      const recentE1rm = recent.map(item => estimateOneRepMax(numericWeight(item.weight), numericValue(item.reps)));
      const trend = recentE1rm.length >= 2 ? recentE1rm[recentE1rm.length - 1] - recentE1rm[0] : 0;

      if (!lastWeight || !lastReps) {
        return {
          weight: defaultWeight,
          title: "Calibrate",
          detail: defaultWeight
            ? `Previous data is incomplete. Use ${displayLoadWithUnit(defaultWeight)} and save weight + reps.`
            : "Previous data is incomplete. Enter a load in kg and save weight + reps."
        };
      }

      if (lastReps >= range.max) {
        const targetE1rm = e1rm * (trend >= 0 ? 1.015 : 1.005);
        const predictedForLowRange = targetE1rm / (1 + range.min / 30);
        const next = roundToLoadStep(Math.max(lastWeight + step, predictedForLowRange), step);
        return {
          weight: formatLoad(next),
          title: "Increase load",
          detail: `Last time: ${displayLoadWithUnit(last.weight)} x ${last.reps}. You reached the top of the range, so try ${displayLoadWithUnit(formatLoad(next))} and rebuild from ${range.min} reps.`
        };
      }

      if (lastReps < range.min) {
        const reduced = roundToLoadStep(lastWeight * 0.95, step);
        return {
          weight: formatLoad(reduced || lastWeight),
          title: "Reduce slightly",
          detail: `Last time: ${displayLoadWithUnit(last.weight)} x ${last.reps}. This is below the range, so use about ${displayLoadWithUnit(formatLoad(reduced || lastWeight))} or keep the same load if technique felt easy.`
        };
      }

      return {
        weight: formatLoad(lastWeight),
        title: "Keep load",
        detail: `Last time: ${displayLoadWithUnit(last.weight)} x ${last.reps}. Keep ${displayLoadWithUnit(formatLoad(lastWeight))} and add reps before increasing.`
      };
    }

    function entryFor(exercise) {
      if (!data.currentEntries[exercise.id]) {
        const suggestion = suggestNextLoad(exercise);
        data.currentEntries[exercise.id] = {
          weight: normalizeWeightInput(suggestion.weight || exercise.defaultWeight),
          reps: String(exercise.defaultReps)
        };
      }
      data.currentEntries[exercise.id].weight = normalizeWeightInput(data.currentEntries[exercise.id].weight);
      data.currentEntries[exercise.id].done = Boolean(data.currentEntries[exercise.id].done);
      return data.currentEntries[exercise.id];
    }

    function activityEntryFor(session) {
      if (!data.currentEntries.activity) {
        data.currentEntries.activity = { ...session.defaults };
      }
      if (session.id === "extraRun" && !data.currentEntries.activity.zone) data.currentEntries.activity.zone = "Zone 2";
      data.currentEntries.activity.done = Boolean(data.currentEntries.activity.done);
      return data.currentEntries.activity;
    }

    function runEntryFor(session) {
      if (!data.currentEntries.run) {
        data.currentEntries.run = {
          duration: session.run?.defaultDuration || "",
          speed: session.run?.defaultSpeed || "",
          distance: "",
          avgHr: "",
          maxHr: "",
          zone: session.run?.id === "easyRun" ? "Zone 2" : "Zones 3-4",
          notes: ""
        };
      }
      data.currentEntries.run.speed = normalizeWeightInput(data.currentEntries.run.speed);
      data.currentEntries.run.done = Boolean(data.currentEntries.run.done);
      return data.currentEntries.run;
    }

    function addonEntryKey(addonId) {
      return `addon_${addonId}`;
    }

    function addonEntryFor(addon) {
      const key = addonEntryKey(addon.id);
      if (!data.currentEntries[key]) {
        data.currentEntries[key] = { ...addon.defaults };
      }
      data.currentEntries[key].speed = normalizeWeightInput(data.currentEntries[key].speed);
      data.currentEntries[key].done = Boolean(data.currentEntries[key].done);
      return data.currentEntries[key];
    }

    function isEditingSession() {
      return Boolean(data.editingRecordId);
    }

    function getEditingRecord() {
      return isEditingSession() ? data.history.find(record => record.id === data.editingRecordId) : null;
    }

    function isCurrentSessionComplete(session) {
      if (!session) return false;
      if (session.type === "strength") {
        const strengthDone = session.exercises.every(item => Boolean(data.currentEntries[item.id]?.done));
        const runDone = session.run ? Boolean(data.currentEntries.run?.done) : true;
        const addonsDone = (session.addons || []).every(addon => Boolean(data.currentEntries[addonEntryKey(addon.id)]?.done));
        return strengthDone && runDone && addonsDone;
      }
      return Boolean(data.currentEntries.activity?.done);
    }

    function getCurrentSessionProgress(session) {
      if (!session) return { done: 0, total: 0, percent: 0 };
      if (session.type === "strength") {
        const exerciseDone = session.exercises.filter(item => Boolean(data.currentEntries[item.id]?.done)).length;
        const addonDone = (session.addons || []).filter(addon => Boolean(data.currentEntries[addonEntryKey(addon.id)]?.done)).length;
        const total = session.exercises.length + (session.run ? 1 : 0) + (session.addons?.length || 0);
        const done = exerciseDone + (session.run && data.currentEntries.run?.done ? 1 : 0) + addonDone;
        return { done, total, percent: total ? Math.round((done / total) * 100) : 0 };
      }
      const done = data.currentEntries.activity?.done ? 1 : 0;
      return { done, total: 1, percent: done ? 100 : 0 };
    }

    function renderSessionProgressBar(session) {
      const progress = getCurrentSessionProgress(session);
      return `
        <section class="notice" style="margin-bottom:.8rem">
          <strong>${progress.done}/${progress.total} completed</strong>
          <div class="progress-bar" style="margin-top:.55rem" aria-label="Session progress"><span style="--value:${progress.percent}%"></span></div>
          <p class="fine" style="margin-top:.4rem">${progress.percent}% of this session done.</p>
        </section>
      `;
    }

    function hydrateEntriesFromRecord(record) {
      const session = getSession(record.sessionId);
      const entries = {};
      (record.exercises || []).forEach(item => {
        entries[item.id] = {
          weight: normalizeWeightInput(item.weight),
          reps: item.reps || "",
          done: true
        };
      });
      if (record.running) {
        entries.run = {
          duration: record.running.duration || "",
          speed: normalizeWeightInput(record.running.speed),
          distance: record.running.distance || "",
          avgHr: record.running.avgHr || "",
          maxHr: record.running.maxHr || "",
          zone: record.running.zone || "",
          notes: record.running.notes || "",
          done: true
        };
      }
      if (record.activity) {
        entries.activity = {
          ...(session?.defaults || {}),
          duration: record.activity.duration || "",
          speed: normalizeWeightInput(record.activity.speed),
          distance: record.activity.distance || "",
          avgHr: record.activity.avgHr || "",
          maxHr: record.activity.maxHr || "",
          effort: record.activity.effort || "",
          zone: record.activity.zone || "",
          notes: record.activity.notes || "",
          done: true
        };
      }
      (record.addons || []).forEach(addon => {
        entries[addonEntryKey(addon.id)] = {
          ...(session?.addons?.find(item => item.id === addon.id)?.defaults || {}),
          duration: addon.duration || "",
          speed: normalizeWeightInput(addon.speed),
          distance: addon.distance || "",
          avgHr: addon.avgHr || "",
          maxHr: addon.maxHr || "",
          zone: addon.zone || "",
          notes: addon.notes || "",
          done: true
        };
      });
      return entries;
    }

    function getRunPlan(session) {
      const week = getSelectedWeek();
      const weekIndex = week?.index || 1;

      if (session.run?.id === "easyRun") {
        return {
          title: "How to do the Easy Run",
          lines: [
            "Run after strength training, never before.",
            "Duration: 25 to 30 minutes.",
            "Treadmill speed guide: 6,9 to 8,0 km/h, roughly 7:30 to 8:45 min/km.",
            "Target zone: Zone 2, around 60-70% of max heart rate. It should feel easy and aerobic.",
            "Practical check: you should be able to speak in short sentences and avoid drifting into Zone 4.",
            "Optional incline: 0,5% to 1%. Do not chase a record here."
          ]
        };
      }

      if (weekIndex <= 4) {
        return {
          title: "How to do the Quality Run",
          lines: [
            "Run after strength training, never before.",
            "Warm-up: 8 minutes easy in Zones 1-2 at 6,9 to 7,7 km/h.",
            "Main set: 8 rounds of 30 seconds fast in Zones 3-4 at 8,9 to 10,0 km/h, then 90 seconds easy jog or active walk back toward Zone 2.",
            "Cool-down: 5 minutes easy.",
            "Keep the fast parts controlled. Avoid spending repeated time in Zone 5."
          ]
        };
      }

      if (weekIndex <= 8) {
        return {
          title: "How to do the Quality Run",
          lines: [
            "Run after strength training, never before.",
            "Warm-up: 8 minutes easy in Zones 1-2.",
            "Main set: 6 rounds of 1 minute fast in Zones 3-4 at 9,2 to 10,3 km/h, then 90 seconds to 2 minutes easy back toward Zone 2.",
            "Cool-down: 5 minutes easy.",
            "Keep good form and avoid spending repeated time in Zone 5."
          ]
        };
      }

      return {
        title: "How to do the Quality Run",
        lines: [
          "Run after strength training, never before.",
          "Warm-up: 8 to 10 minutes easy in Zones 1-2.",
          "Main set: 3 rounds of 4 minutes steady in Zone 3, briefly touching Zone 4 if needed, at 8,6 to 9,5 km/h. Recover for 2 minutes easy toward Zone 2.",
          "Cool-down: 5 minutes easy.",
          "This is a controlled sustained effort, not an all-out test."
        ]
      };
    }

      const plan = ACTIVITY_PROGRESSIONS[session.id];

      return `

      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });

    function editHistoryRecord(recordId) {
      const record = data.history.find(item => item.id === recordId);
      const session = record ? getSession(record.sessionId) : null;
      if (!record || !session) return;
      data.selectedWeekId = record.weekId || data.selectedWeekId || getCurrentProgramWeek()?.id || weeks[0]?.id || "";
      data.selectedSessionId = record.sessionId;
      data.editingRecordId = record.id;
      data.currentEntries = hydrateEntriesFromRecord(record);
      sessionScreen = "form";
      activeTab = "session";
      saveData();
      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function saveWorkout() {
      const session = getSession(data.selectedSessionId);
      const week = getSelectedWeek();
      if (!session || !week) return;
      const editingRecord = getEditingRecord();

      const record = {
        id: editingRecord?.id || makeId(),
        date: editingRecord?.date || today(),
        weekId: week.id,
        weekLabel: `${week.label} · ${week.range}`,
        sessionId: session.id,
        sessionName: session.name,
        icon: session.icon,
        type: session.type,
        exercises: [],
        activity: null,
        running: null,
        addons: []
      };

      if (session.type === "strength") {
        record.exercises = session.exercises.map(item => {
          const entry = entryFor(item);
          return {
            id: item.id,
            name: item.name,
            sets: item.sets,
            reps: entry.reps,
            weight: normalizeWeightInput(entry.weight),
            repRange: item.repRange
          };
        });
        if (session.run) {
          const entry = runEntryFor(session);
          record.running = {
            kind: session.run.id,
            name: session.run.name,
            duration: entry.duration,
            speed: normalizeWeightInput(entry.speed),
            distance: entry.distance,
            avgHr: entry.avgHr,
            maxHr: entry.maxHr,
            zone: entry.zone,
            notes: entry.notes
          };
        }
        record.addons = (session.addons || []).map(addon => {
          const entry = addonEntryFor(addon);
          return {
            id: addon.id,
            kind: addon.kind,
            name: addon.name,
            icon: addon.icon,
            duration: entry.duration,
            speed: normalizeWeightInput(entry.speed),
            distance: entry.distance,
            avgHr: entry.avgHr,
            maxHr: entry.maxHr,
            zone: entry.zone,
            notes: entry.notes
          };
        });
      } else {
        const entry = activityEntryFor(session);
        record.activity = {
          duration: entry.duration,
          speed: normalizeWeightInput(entry.speed),
          distance: entry.distance,
          avgHr: entry.avgHr,
          maxHr: entry.maxHr,
          effort: entry.effort,
          zone: entry.zone
        };
        if (entry.notes) record.activity.notes = entry.notes;
      }

      if (editingRecord) {
        data.history = data.history.map(item => item.id === editingRecord.id ? record : item);
      } else {
        data.history.unshift(record);
      }
      markSessionDone(week.id, session.id, true, false);
      data.lastSavedAt = new Date().toISOString();
      data.currentEntries = {};
      data.editingRecordId = "";
      data.selectedSessionId = "";
      sessionScreen = "sessions";
      activeTab = "session";
      saveData();
      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

        card.addEventListener("click", event => {
          if (event.target.closest(".done-check, input, button, select, textarea, label")) return;
          selectSession(card.dataset.selectSession);
        });
        card.addEventListener("keydown", event => {
          if (event.target !== card || !["Enter", " "].includes(event.key)) return;
          event.preventDefault();
          selectSession(card.dataset.selectSession);
        });
      });

      document.querySelectorAll("[data-session-done]").forEach(input => {
        input.addEventListener("change", event => {
          const week = getSelectedWeek();
          if (!week) return;
          markSessionDone(week.id, event.currentTarget.dataset.sessionDone, event.currentTarget.checked);
          renderAll();

      document.querySelector("#backToWeeks")?.addEventListener("click", () => {

        data.selectedSessionId = "";
        data.editingRecordId = "";

        saveData();
        renderAll();

      document.querySelector("#backToSessions")?.addEventListener("click", () => {

        saveData();
        renderAll();
      });

            const normalized = normalizeWeightInput(event.currentTarget.value);

            data.currentEntries[id][field] = normalized;

        if (isCurrentSessionComplete(session)) saveWorkout();
        else renderAll();

            event.currentTarget.value = normalized;
            data.currentEntries.run[field] = normalized;

          }
          saveData();

        input.addEventListener("change", updateRunField);

        if (!data.currentEntries.run) data.currentEntries.run = {};

    function healthPoint(measurement, value) {
      return { date: measurement.date || today(), value };
    }

    function renderHealthWeightChart(measurements) {
      const points = measurements
        .map(item => healthPoint(item, numericWeight(item.totalWeight)))
        .filter(point => point.value > 0);

      return renderHealthLineChart({
        title: "Weight Trend",
        subtitle: "Total body weight over time",
        unit: "kg",
        emptyMessage: "Save at least one total weight measurement to start this chart.",
        series: [{ label: "Weight", color: "#157c65", points }]
      });
    }

    function renderHealthCompositionChart(measurements) {
      const fatPoints = [];
      const musclePoints = [];
      measurements.forEach(item => {
        const percentages = calculateHealthPercentages(item);
        if (Number.isFinite(percentages.fatPercent)) fatPoints.push(healthPoint(item, percentages.fatPercent));
        if (Number.isFinite(percentages.musclePercent)) musclePoints.push(healthPoint(item, percentages.musclePercent));
      });

      return renderHealthLineChart({
        title: "Composition Trend",
        subtitle: "Body fat % and muscle mass %",
        unit: "%",
        emptyMessage: "Save fat mass and muscle mass with total weight to start this chart.",
        series: [
          { label: "Body fat", color: "#b83a3a", points: fatPoints },
          { label: "Muscle mass", color: "#157c65", points: musclePoints }
        ]
      });
    }

    function renderHealthLineChart({ title, subtitle, unit, emptyMessage, series }) {
      const validSeries = series.map(item => ({
        ...item,
        points: item.points.filter(point => Number.isFinite(point.value))
      }));
      const allPoints = validSeries.flatMap(item => item.points);

      if (!allPoints.length) {
        return `
          <article class="card chart-card">
            <div>
              <strong>${escapeHtml(title)}</strong>
              <p class="fine">${escapeHtml(subtitle)}</p>
            </div>
            <div class="empty">${escapeHtml(emptyMessage)}</div>
          </article>
        `;
      }

      const chartWidth = 340;
      const chartHeight = 160;
      const padding = 30;
      const dates = [...new Set(allPoints.map(point => point.date))].sort();
      const values = allPoints.map(point => point.value);
      const minValue = Math.min(...values);
      const maxValue = Math.max(...values);
      const flatRange = Math.max(1, maxValue * 0.08);
      const chartMin = minValue === maxValue ? Math.max(0, minValue - flatRange) : minValue;
      const chartMax = minValue === maxValue ? maxValue + flatRange : maxValue;
      const span = chartMax - chartMin || 1;
      const xForDate = date => dates.length === 1
        ? chartWidth / 2
        : padding + (dates.indexOf(date) / (dates.length - 1)) * (chartWidth - padding * 2);
      const yForValue = value => chartHeight - padding - ((value - chartMin) / span) * (chartHeight - padding * 2);
      const formatChartValue = value => unit === "%" ? formatPercent(value) : `${formatDecimalComma(value)} ${unit}`;

      const paths = validSeries.map(item => {
        const coordinates = item.points.map(point => ({
          ...point,
          x: xForDate(point.date),
          y: yForValue(point.value)
        }));
        const path = coordinates.map((point, index) => `${index ? "L" : "M"} ${point.x.toFixed(1)} ${point.y.toFixed(1)}`).join(" ");
        return { ...item, coordinates, path };
      });

      return `
        <article class="card chart-card">
          <div class="progress-head">
            <div>
              <strong>${escapeHtml(title)}</strong>
              <p class="fine">${escapeHtml(subtitle)}</p>
            </div>
          </div>
          <svg class="chart-svg" viewBox="0 0 ${chartWidth} ${chartHeight}" role="img" aria-label="${escapeHtml(title)} chart">
            <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${chartHeight - padding}" stroke="#d7ded8" stroke-width="1" />
            <line x1="${padding}" y1="${chartHeight - padding}" x2="${chartWidth - padding}" y2="${chartHeight - padding}" stroke="#d7ded8" stroke-width="1" />
            <line x1="${padding}" y1="${chartHeight / 2}" x2="${chartWidth - padding}" y2="${chartHeight / 2}" stroke="#edf1ee" stroke-width="1" />
            ${paths.map(item => `
              <path d="${item.path}" fill="none" stroke="${item.color}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
              ${item.coordinates.map(point => `<circle cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="4.5" fill="${item.color}"><title>${escapeHtml(item.label)} - ${escapeHtml(point.date)} - ${escapeHtml(formatChartValue(point.value))}</title></circle>`).join("")}
            `).join("")}
            <text x="${padding}" y="${padding - 8}" fill="#52645a" font-size="11">${escapeHtml(formatChartValue(chartMax))}</text>
            <text x="${padding}" y="${chartHeight - 6}" fill="#52645a" font-size="11">${escapeHtml(formatChartValue(chartMin))}</text>
          </svg>
          <div class="pill-row">
            ${validSeries.map(item => `<span class="pill"><span aria-hidden="true" style="width:.7rem;height:.7rem;border-radius:999px;background:${item.color};display:inline-block;margin-right:.35rem"></span>${escapeHtml(item.label)}</span>`).join("")}
          </div>
        </article>
      `;
    }

    function renderHealthHistoryTable(measurements) {

            <thead>

    function saveHealthMeasurement() {
      const draft = getHealthDraft();
      const total = numericWeight(draft.totalWeight);
      if (!total) {
        alert("Add a total weight before saving.");
        return;
      }

      data.health = data.health || [];
      const existing = data.editingHealthId ? data.health.find(item => item.id === data.editingHealthId) : null;
      const record = {
        id: existing?.id || makeId(),
        date: draft.date || today(),
        totalWeight: normalizeWeightInput(draft.totalWeight),
        fatWeight: normalizeWeightInput(draft.fatWeight),
        muscleWeight: normalizeWeightInput(draft.muscleWeight),
        createdAt: existing?.createdAt || new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      if (existing) {
        data.health = data.health.map(item => item.id === existing.id ? record : item);
      } else {
        data.health.unshift(record);
      }

      data.editingHealthId = "";
      data.healthDraft = emptyHealthDraft();
      saveData();
      renderAll();
    }

    function editHealthMeasurement(id) {
      const measurement = (data.health || []).find(item => item.id === id);
      if (!measurement) return;
      data.editingHealthId = id;
      data.healthDraft = {
        date: measurement.date || today(),
        totalWeight: normalizeWeightInput(measurement.totalWeight),
        fatWeight: normalizeWeightInput(measurement.fatWeight),
        muscleWeight: normalizeWeightInput(measurement.muscleWeight)
      };
      activeTab = "health";
      saveData();
      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function bindHealthEvents() {
      document.querySelectorAll("[data-health-field]").forEach(input => {
        input.addEventListener("input", event => {
          const field = event.currentTarget.dataset.healthField;
          const draft = getHealthDraft();
          if (field === "date") {
            draft[field] = event.currentTarget.value;
          } else {
            const normalized = normalizeWeightInput(event.currentTarget.value);
            event.currentTarget.value = normalized;
            draft[field] = normalized;
          }
          saveData();
          updateHealthPreview();
        });
      });

      document.querySelector("#saveHealthMeasurement")?.addEventListener("click", saveHealthMeasurement);

      document.querySelector("#cancelHealthEdit")?.addEventListener("click", () => {
        data.editingHealthId = "";
        data.healthDraft = emptyHealthDraft();
        saveData();
        renderAll();
      });

      document.querySelectorAll("[data-edit-health]").forEach(button => {
        button.addEventListener("click", event => editHealthMeasurement(event.currentTarget.dataset.editHealth));
      });

      document.querySelectorAll("[data-delete-health]").forEach(button => {
        button.addEventListener("click", event => {
          const id = event.currentTarget.dataset.deleteHealth;
          const measurement = (data.health || []).find(item => item.id === id);
          if (!measurement) return;
          if (confirm(`Delete health measurement from ${measurement.date || "this date"}?`)) {
            data.health = (data.health || []).filter(item => item.id !== id);
            if (data.editingHealthId === id) {
              data.editingHealthId = "";
              data.healthDraft = emptyHealthDraft();
            }
            saveData();
            renderAll();
          }
        });
      });
    }

    function renderProgress() {
      const stats = getProgressStats();
      const selectedWeek = getSelectedWeek();
      const sessionCounts = getSessionSummaryCounts();
      const cardioItems = getCardioProgressItems(stats.activities);
      document.querySelector("#view-progress").innerHTML = `
        ${renderProgressCalendar()}

        <section class="hero">
          <div>
            <div class="pill-row">
              <span class="pill good">${data.history.length} session${data.history.length > 1 ? "s" : ""}</span>
              <span class="pill">${stats.exerciseCount} exercise${stats.exerciseCount > 1 ? "s" : ""}</span>
              <span class="pill">${stats.activityCount} cardio</span>
            </div>
            <h1>Progress</h1>
          </div>
        </section>

        ${data.lastSavedAt ? `<section class="notice" style="margin-top:1rem">Last saved session: ${new Date(data.lastSavedAt).toLocaleString("en-GB")}${selectedWeek ? ` · active week: ${selectedWeek.label}` : ""}.</section>` : ""}

        <div class="section-title">
          <h2>Summary</h2>
        </div>
        <section class="grid progress-grid">
          ${getDisplaySessions().map(session => renderSessionSummaryCard(session, sessionCounts[session.id] || 0)).join("")}
        </section>

        <div class="section-title">
          <h2>Weight Progress Charts</h2>
          <span class="fine">Saved loads over time</span>
        </div>
        <section class="grid progress-grid">
          ${stats.exercises.length ? stats.exercises.map(renderExerciseWeightChart).join("") : `<div class="empty">No exercise saved yet.</div>`}
        </section>

        <div class="section-title">
          <h2>Cardio</h2>
          <span class="fine">Progression charts by activity</span>
        </div>
        <section class="grid progress-grid">
          ${cardioItems.map(renderActivityProgress).join("")}
        </section>

        <div class="section-title">
          <h2>History</h2>
          <span class="fine">Recent sessions</span>
        </div>
        <section class="card grid">
          ${data.history.length ? renderHistoryTable() : `<div class="empty">History will appear here after your first save.</div>`}
          <button class="btn secondary" type="button" id="exportData">Export data</button>
          <button class="btn danger" type="button" id="resetData">Reset</button>
        </section>
      `;
      bindProgressEvents();
