    function getMonthKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${year}-${month}`;
    }

    function getDateKey(year, monthIndex, day) {
      return `${year}-${String(monthIndex + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function getCalendarRecordsByDate(monthDate) {
      const monthKey = getMonthKey(monthDate);
      return data.history.reduce((map, record) => {
        if (!record.date || String(record.date).slice(0, 7) !== monthKey) return map;
        if (!map.has(record.date)) map.set(record.date, []);
        map.get(record.date).push(record);
        return map;
      }, new Map());
    }

    function getRecordCalendarIcon(record) {
      return record.icon || getSession(record.sessionId)?.icon || (record.type === "strength" ? "🏋️‍♀️" : "•");
    }

    function renderProgressCalendar() {
      const year = calendarCursor.getFullYear();
      const monthIndex = calendarCursor.getMonth();
      const monthTitle = calendarCursor.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
      const firstDay = new Date(year, monthIndex, 1);
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
      const startOffset = (firstDay.getDay() + 6) % 7;
      const recordsByDate = getCalendarRecordsByDate(calendarCursor);
      const monthSessionCount = [...recordsByDate.values()].reduce((sum, records) => sum + records.length, 0);
      const todayKey = today();
      const cells = [];

      for (let i = 0; i < startOffset; i += 1) {
        cells.push(`<div class="calendar-day empty-day" aria-hidden="true"></div>`);
      }

      for (let day = 1; day <= daysInMonth; day += 1) {
        const dateKey = getDateKey(year, monthIndex, day);
        const records = recordsByDate.get(dateKey) || [];
        const visibleRecords = records.slice(0, 6);
        const extraCount = Math.max(0, records.length - visibleRecords.length);
        const titles = records.map(record => getSessionDisplayName(record)).join(", ");
        cells.push(`
          <div class="calendar-day ${dateKey === todayKey ? "today" : ""}" title="${escapeHtml(titles)}">
            <span class="calendar-number">${day}</span>
            ${records.length ? `
              <div class="calendar-icons" aria-label="${escapeHtml(`${records.length} session${records.length > 1 ? "s" : ""} on ${dateKey}`)}">
                ${visibleRecords.map(record => `<span class="calendar-icon" title="${escapeHtml(getSessionDisplayName(record))}">${escapeHtml(getRecordCalendarIcon(record))}</span>`).join("")}
                ${extraCount ? `<span class="calendar-more">+${extraCount}</span>` : ""}
              </div>
            ` : ""}
          </div>
        `);
      }

      while (cells.length % 7 !== 0) {
        cells.push(`<div class="calendar-day empty-day" aria-hidden="true"></div>`);
      }

      return `
        <section class="card calendar-card" aria-label="Monthly session calendar">
          <div class="calendar-top">
            <div>
              <strong>Monthly Calendar</strong>
              <p class="fine">${monthSessionCount} saved session${monthSessionCount > 1 ? "s" : ""} in ${escapeHtml(monthTitle)}</p>
            </div>
            <div class="calendar-nav" aria-label="Calendar navigation">
              <button class="btn secondary" type="button" data-calendar-shift="-1" aria-label="Previous month">‹</button>
              <button class="btn secondary today-btn" type="button" data-calendar-today aria-label="Current month">Today</button>
              <button class="btn secondary" type="button" data-calendar-shift="1" aria-label="Next month">›</button>
            </div>
          </div>
          <div class="calendar-grid">
            ${CALENDAR_WEEKDAYS.map(day => `<div class="calendar-weekday">${day}</div>`).join("")}
            ${cells.join("")}
          </div>
        </section>
      `;
    }

    function getProgressStats() {
      const exerciseMap = new Map();
      const activityMap = new Map();
      let bestVolume = 0;

      [...data.history].reverse().forEach(record => {
        (record.exercises || []).forEach(item => {
          if (!exerciseMap.has(item.id)) {
            exerciseMap.set(item.id, {
              id: item.id,
              name: getExerciseDisplayName(item),
              first: item,
              last: item,
              bestWeight: numericWeight(item.weight),
              bestVolume: 0,
              count: 0,
              records: []
            });
          }

          const current = exerciseMap.get(item.id);
          const weight = numericWeight(item.weight);
          const reps = numericValue(item.reps);
          const volume = weight * reps * Number(item.sets || 0);

          current.last = item;
          current.bestWeight = Math.max(current.bestWeight, weight);
          current.bestVolume = Math.max(current.bestVolume, volume);
          current.count += 1;
          current.records.push({ date: record.date, weekLabel: getWeekDisplayLabel(record), sessionName: getSessionDisplayName(record), ...item, volume });
          bestVolume = Math.max(bestVolume, volume);
        });

        if (record.activity) {
          if (!activityMap.has(record.sessionId)) {
            activityMap.set(record.sessionId, {
              id: record.sessionId,
              icon: record.icon || "",
              name: getSessionDisplayName(record),
              first: record.activity,
              last: record.activity,
              count: 0,
              bestDuration: 0,
              bestDistance: 0,
              records: []
            });
          }
          const current = activityMap.get(record.sessionId);
          current.last = record.activity;
          current.count += 1;
          current.bestDuration = Math.max(current.bestDuration, numericValue(record.activity.duration));
          current.bestDistance = Math.max(current.bestDistance, numericValue(record.activity.distance));
          current.records.push({
            date: record.date,
            weekLabel: getWeekDisplayLabel(record),
            sessionName: getSessionDisplayName(record),
            ...record.activity
          });
        }

        if (record.running) {
          const key = `${record.sessionId}-${record.running.kind || "run"}`;
          if (!activityMap.has(key)) {
            activityMap.set(key, {
              id: key,
              icon: "🏃",
              name: record.running.name || "Run",
              first: record.running,
              last: record.running,
              count: 0,
              bestDuration: 0,
              bestDistance: 0,
              records: []
            });
          }
          const current = activityMap.get(key);
          current.last = record.running;
          current.count += 1;
          current.bestDuration = Math.max(current.bestDuration, numericValue(record.running.duration));
          current.bestDistance = Math.max(current.bestDistance, numericValue(record.running.distance));
          current.records.push({
            date: record.date,
            weekLabel: getWeekDisplayLabel(record),
            sessionName: getSessionDisplayName(record),
            ...record.running
          });
        }

        (record.addons || []).forEach(addon => {
          const key = addon.kind === "cycling" ? "bike30" : addon.kind === "swimming" ? "swim50" : addon.id;
          const name = addon.kind === "cycling" ? "Cycling" : addon.kind === "swimming" ? "Swimming" : addon.name;
          if (!activityMap.has(key)) {
            activityMap.set(key, {
              id: key,
              icon: addon.icon || "",
              name,
              first: addon,
              last: addon,
              count: 0,
              bestDuration: 0,
              bestDistance: 0,
              records: []
            });
          }
          const current = activityMap.get(key);
          current.last = addon;
          current.count += 1;
          current.bestDuration = Math.max(current.bestDuration, numericValue(addon.duration));
          current.bestDistance = Math.max(current.bestDistance, numericValue(addon.distance));
          current.records.push({
            date: record.date,
            weekLabel: getWeekDisplayLabel(record),
            sessionName: getSessionDisplayName(record),
            ...addon
          });
        });
      });

      const exercises = [...exerciseMap.values()].sort((a, b) => a.name.localeCompare(b.name, "en"));
      const activities = [...activityMap.values()].sort((a, b) => a.name.localeCompare(b.name, "en"));
      return { exercises, activities, exerciseCount: exercises.length, activityCount: activities.length, bestVolume };
    }

    function getCardioProgressItems(activities) {
      const activityMap = new Map(activities.map(item => [item.id, item]));
      const expected = [
        { id: "upperA-qualityRun", icon: "🏃", name: "Quality Run" },
        { id: "swim50", icon: getSession("swim50")?.icon || "🏊", name: "Swimming" },
        { id: "upperB-easyRun", icon: "🏃", name: "Easy Run" },
        { id: "bike30", icon: getSession("bike30")?.icon || "🚴", name: "Cycling" }
      ];
      const expectedIds = new Set(expected.map(item => item.id));
      const coreItems = expected.map(item => activityMap.get(item.id) || {
        ...item,
        first: {},
        last: {},
        count: 0,
        bestDuration: 0,
        bestDistance: 0,
        records: []
      });
      const extraItems = activities.filter(item => !expectedIds.has(item.id));
      return [...coreItems, ...extraItems];
    }

    function renderExerciseWeightChart(item) {
      const points = item.records
        .map(record => ({ ...record, value: numericWeight(record.weight) }))
        .filter(record => record.value > 0);

      if (!points.length) {
        return `
          <article class="card grid">
            <div class="progress-head">
              <div>
                <strong>${escapeHtml(item.name)}</strong>
                <p class="fine">No numeric load saved yet</p>
              </div>
            </div>
            <div class="empty">Save a weight for this exercise to start the chart.</div>
          </article>
        `;
      }

      const chartWidth = 320;
      const chartHeight = 130;
      const padding = 24;
      const weights = points.map(point => point.value);
      const minWeight = Math.min(...weights);
      const maxWeight = Math.max(...weights);
      const flatRange = Math.max(1, maxWeight * 0.12);
      const chartMin = minWeight === maxWeight ? Math.max(0, minWeight - flatRange) : minWeight;
      const chartMax = minWeight === maxWeight ? maxWeight + flatRange : maxWeight;
      const span = chartMax - chartMin || 1;
      const coordinates = points.map((point, index) => {
        const x = points.length === 1
          ? chartWidth / 2
          : padding + (index / (points.length - 1)) * (chartWidth - padding * 2);
        const y = chartHeight - padding - ((point.value - chartMin) / span) * (chartHeight - padding * 2);
        return { ...point, x, y };
      });
      const linePath = coordinates.map((point, index) => `${index ? "L" : "M"} ${point.x.toFixed(1)} ${point.y.toFixed(1)}`).join(" ");
      const first = points[0];
      const latest = points[points.length - 1];
      const change = latest.value - first.value;
      const changeLabel = change > 0 ? `+${formatDecimalComma(change)} kg` : change < 0 ? `${formatDecimalComma(change)} kg` : "stable";
      const changeClass = change > 0 ? "good" : change < 0 ? "warn" : "";

      return `
        <article class="card grid">
          <div class="progress-head">
            <div>
              <strong>${escapeHtml(item.name)}</strong>
              <p class="fine">${points.length} saved load${points.length > 1 ? "s" : ""}</p>
            </div>
            <span class="pill ${changeClass}">${changeLabel}</span>
          </div>
          <svg viewBox="0 0 ${chartWidth} ${chartHeight}" role="img" aria-label="${escapeHtml(item.name)} weight progression chart" style="width:100%;height:auto;display:block">
            <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${chartHeight - padding}" stroke="#d7ded8" stroke-width="1" />
            <line x1="${padding}" y1="${chartHeight - padding}" x2="${chartWidth - padding}" y2="${chartHeight - padding}" stroke="#d7ded8" stroke-width="1" />
            <line x1="${padding}" y1="${chartHeight / 2}" x2="${chartWidth - padding}" y2="${chartHeight / 2}" stroke="#edf1ee" stroke-width="1" />
            <path d="${linePath}" fill="none" stroke="#2f6f55" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
            ${coordinates.map(point => `<circle cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="4.5" fill="#2f6f55"><title>${escapeHtml(point.weekLabel)} - ${formatDecimalComma(point.value)} kg</title></circle>`).join("")}
            <text x="${padding}" y="${padding - 8}" fill="#52645a" font-size="11">${formatDecimalComma(chartMax)} kg</text>
            <text x="${padding}" y="${chartHeight - 6}" fill="#52645a" font-size="11">${formatDecimalComma(chartMin)} kg</text>
          </svg>
          <div class="summary compact-summary">
            <div class="stat"><small>First</small><strong>${escapeHtml(displayLoadWithUnit(first.weight))}</strong></div>
            <div class="stat"><small>Latest</small><strong>${escapeHtml(displayLoadWithUnit(latest.weight))}</strong></div>
            <div class="stat"><small>Best</small><strong>${formatDecimalComma(maxWeight)} kg</strong></div>
          </div>
        </article>
      `;
    }

    function renderExerciseProgress(item) {
      const firstWeight = numericWeight(item.first.weight);
      const lastWeight = numericWeight(item.last.weight);
      const diff = lastWeight - firstWeight;
      const trend = diff > 0 ? `+${formatDecimalComma(diff)} kg` : diff < 0 ? `${formatDecimalComma(diff)} kg` : "stable";
      const trendClass = diff > 0 ? "good" : diff < 0 ? "warn" : "";

      return `
        <article class="card grid">
          <div class="progress-head">
            <div>
              <strong>${item.name}</strong>
              <p class="fine">${item.count} log${item.count > 1 ? "s" : ""}</p>
            </div>
            <span class="pill ${trendClass}">${trend}</span>
          </div>
          <div class="summary">
            <div class="stat"><small>Last weight</small><strong>${escapeHtml(displayLoadWithUnit(item.last.weight))}</strong></div>
            <div class="stat"><small>Last reps</small><strong>${escapeHtml(item.last.reps)}</strong></div>
            <div class="stat"><small>Sets</small><strong>${item.last.sets}</strong></div>
          </div>
          <div class="notice">
            Best logged load: <strong>${item.bestWeight ? `${formatDecimalComma(item.bestWeight)} kg` : escapeHtml(displayLoadWithUnit(item.last.weight))}</strong>.
            ${item.bestVolume ? `Best estimated volume: <strong>${Math.round(item.bestVolume)}</strong>.` : ""}
          </div>
        </article>
      `;
    }

    function renderSessionSummaryCard(session, count) {
      return `
        <article class="card grid">
          <div class="progress-head">
            <div>
              <strong>${session.icon} ${session.name}</strong>
              <p class="fine">${session.focus}</p>
            </div>
            <span class="pill ${count ? "good" : ""}">${count}</span>
          </div>
          <div class="pill-row">
            <span class="pill">${session.duration}</span>
            <span class="pill">${session.type === "strength" ? "strength" : "cardio"}</span>
            ${session.optional ? `<span class="pill warn">optional</span>` : ""}
          </div>
        </article>
      `;
    }

    function renderMuscleVolumeCard(item) {
      const statusClass = item.status === "Productive" ? "good" : item.status === "High" ? "warn" : "";
      const message = item.status === "Low"
        ? "Below the target range."
        : item.status === "High"
          ? "Above the target range. Watch recovery."
          : "Inside the target range.";

      return `
        <article class="card grid">
          <div class="progress-head">
            <div>
              <strong>${item.label}</strong>
              <p class="fine">Target: ${item.min} to ${item.max} sets/week</p>
            </div>
            <span class="pill ${statusClass}">${item.status}</span>
          </div>
          <div class="progress-bar" aria-label="${item.label} weekly volume"><span style="--value:${item.percent}%"></span></div>
          <div class="summary">
            <div class="stat"><small>This week</small><strong>${item.sets}</strong></div>
            <div class="stat"><small>Minimum</small><strong>${item.min}</strong></div>
            <div class="stat"><small>Upper guide</small><strong>${item.max}</strong></div>
          </div>
          <p class="fine">${message}</p>
        </article>
      `;
    }

    function formatActivityMetricValue(value, unit) {
      if (!Number.isFinite(value)) return "-";
      if (unit === "km/h") return `${formatDecimalComma(value)} km/h`;
      if (unit === "/min") return `${formatDecimalComma(value)} /min`;
      if (unit === "min") return `${formatDecimalComma(value)} min`;
      if (unit === "distance") return formatDecimalComma(value);
      return `${formatDecimalComma(value)} ${unit}`.trim();
    }

    function getActivityMetric(item) {
      const records = item.records || [];
      const lowerName = String(item.name || "").toLowerCase();
      const isSwimming = item.id === "swim50" || lowerName.includes("swim");
      const isRunOrBike = lowerName.includes("run") || lowerName.includes("cycling") || item.id === "bike30" || item.id === "extraRun";
      const primaryPoints = records.map(record => {
        const duration = numericValue(record.duration);
        const distance = numericValue(record.distance);
        const loggedSpeed = numericWeight(record.speed);
        let value = NaN;
        if (duration > 0 && distance > 0) {
          value = isSwimming ? distance / duration : distance / duration * 60;
        } else if (isRunOrBike && loggedSpeed > 0) {
          value = loggedSpeed;
        }
        return { date: record.date || "", value, record };
      }).filter(point => Number.isFinite(point.value) && point.value > 0);

      if (primaryPoints.length) {
        return {
          label: isSwimming ? "Distance/min" : "Avg speed",
          unit: isSwimming ? "/min" : "km/h",
          color: isSwimming ? "#2675a8" : lowerName.includes("cycling") ? "#8a6a1f" : "#157c65",
          points: primaryPoints,
          note: isSwimming
            ? "Calculated from saved distance divided by duration. Keep the same distance unit over time."
            : "Calculated from saved distance and duration, or from saved treadmill speed."
        };
      }

      const distancePoints = records.map(record => ({
        date: record.date || "",
        value: numericValue(record.distance),
        record
      })).filter(point => point.value > 0);

      if (distancePoints.length) {
        return {
          label: "Distance",
          unit: isSwimming ? "distance" : "km",
          color: isSwimming ? "#2675a8" : "#157c65",
          points: distancePoints,
          note: "Distance trend based on saved entries."
        };
      }

      const durationPoints = records.map(record => ({
        date: record.date || "",
        value: numericValue(record.duration),
        record
      })).filter(point => point.value > 0);

      return {
        label: "Duration",
        unit: "min",
        color: "#157c65",
        points: durationPoints,
        note: "Duration trend based on saved entries."
      };
    }

    function renderActivityMetricChart(metric, item) {
      const points = metric.points || [];
      if (!points.length) {
        return `<div class="empty">Save duration and distance for ${escapeHtml(item.name)} to start this chart.</div>`;
      }

      const chartWidth = 340;
      const chartHeight = 150;
      const padding = 28;
      const values = points.map(point => point.value);
      const minValue = Math.min(...values);
      const maxValue = Math.max(...values);
      const flatRange = Math.max(1, maxValue * 0.08);
      const chartMin = minValue === maxValue ? Math.max(0, minValue - flatRange) : minValue;
      const chartMax = minValue === maxValue ? maxValue + flatRange : maxValue;
      const span = chartMax - chartMin || 1;
      const coordinates = points.map((point, index) => {
        const x = points.length === 1
          ? chartWidth / 2
          : padding + (index / (points.length - 1)) * (chartWidth - padding * 2);
        const y = chartHeight - padding - ((point.value - chartMin) / span) * (chartHeight - padding * 2);
        return { ...point, x, y };
      });
      const linePath = coordinates.map((point, index) => `${index ? "L" : "M"} ${point.x.toFixed(1)} ${point.y.toFixed(1)}`).join(" ");

      return `
        <svg class="chart-svg" viewBox="0 0 ${chartWidth} ${chartHeight}" role="img" aria-label="${escapeHtml(item.name)} ${escapeHtml(metric.label)} chart">
          <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${chartHeight - padding}" stroke="#d7ded8" stroke-width="1" />
          <line x1="${padding}" y1="${chartHeight - padding}" x2="${chartWidth - padding}" y2="${chartHeight - padding}" stroke="#d7ded8" stroke-width="1" />
          <line x1="${padding}" y1="${chartHeight / 2}" x2="${chartWidth - padding}" y2="${chartHeight / 2}" stroke="#edf1ee" stroke-width="1" />
          <path d="${linePath}" fill="none" stroke="${metric.color}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
          ${coordinates.map(point => `<circle cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="4.5" fill="${metric.color}"><title>${escapeHtml(point.date)} - ${escapeHtml(formatActivityMetricValue(point.value, metric.unit))}</title></circle>`).join("")}
          <text x="${padding}" y="${padding - 8}" fill="#52645a" font-size="11">${escapeHtml(formatActivityMetricValue(chartMax, metric.unit))}</text>
          <text x="${padding}" y="${chartHeight - 6}" fill="#52645a" font-size="11">${escapeHtml(formatActivityMetricValue(chartMin, metric.unit))}</text>
        </svg>
      `;
    }

    function renderActivityProgress(item) {
      const metric = getActivityMetric(item);
      const latestPoint = metric.points[metric.points.length - 1];
      const bestPoint = metric.points.reduce((best, point) => !best || point.value > best.value ? point : best, null);
      const latest = item.last || {};

      return `
        <article class="card chart-card">
          <div class="progress-head">
            <div>
              <strong>${item.icon} ${item.name}</strong>
              <p class="fine">${item.count} session${item.count > 1 ? "s" : ""}</p>
            </div>
            <span class="pill ${latestPoint ? "good" : ""}">${escapeHtml(metric.label)}</span>
          </div>
          ${renderActivityMetricChart(metric, item)}
          <div class="summary">
            <div class="stat"><small>Latest KPI</small><strong>${latestPoint ? escapeHtml(formatActivityMetricValue(latestPoint.value, metric.unit)) : "-"}</strong></div>
            <div class="stat"><small>Best KPI</small><strong>${bestPoint ? escapeHtml(formatActivityMetricValue(bestPoint.value, metric.unit)) : "-"}</strong></div>
            <div class="stat"><small>Last zone</small><strong>${escapeHtml(latest.zone || latest.effort || "-")}</strong></div>
          </div>
          <div class="notice">
            ${escapeHtml(metric.note)}
            ${latest.duration || latest.distance ? `<br>Latest: <strong>${escapeHtml(latest.duration || "-")} min</strong>${latest.distance ? ` - distance: <strong>${escapeHtml(latest.distance)}</strong>` : ""}${latest.speed ? ` - speed: <strong>${escapeHtml(displaySpeedWithUnit(latest.speed))}</strong>` : ""}.` : ""}
          </div>
        </article>
      `;
    }

    function renderHistoryTable() {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Week</th>
                <th>Date</th>
                <th>Session</th>
                <th>Details</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              ${data.history.slice(0, 24).map(record => `
                <tr>
                  <td>${escapeHtml(getWeekDisplayLabel(record))}</td>
                  <td>${record.date}</td>
                  <td>${escapeHtml(`${record.icon || ""} ${getSessionDisplayName(record)}`)}</td>
                  <td>${renderRecordDetail(record)}</td>
                  <td>
                    <div class="history-actions">
                      <button class="btn secondary" type="button" data-edit-record="${record.id}">Edit</button>
                      <button class="btn danger" type="button" data-delete-record="${record.id}">Delete</button>
                    </div>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderRecordDetail(record) {
      if (record.activity && !(record.exercises || []).length) {
        const speed = record.activity.speed ? ` · Speed: ${escapeHtml(displaySpeedWithUnit(record.activity.speed))}` : "";
        const hr = record.activity.avgHr || record.activity.maxHr ? ` · HR: ${escapeHtml(record.activity.avgHr || "-")}/${escapeHtml(record.activity.maxHr || "-")} bpm` : "";
        const intensity = record.activity.zone ? ` · Zone: ${escapeHtml(record.activity.zone)}` : ` · Effort: ${escapeHtml(record.activity.effort || "-")}/10`;
        return `Duration: ${escapeHtml(record.activity.duration || "-")} min${speed} · Distance: ${escapeHtml(record.activity.distance || "-")}${hr}${intensity}`;
      }
      const strength = (record.exercises || [])
        .map(item => `${escapeHtml(getExerciseDisplayName(item))}: ${escapeHtml(displayLoadWithUnit(item.weight))}, ${escapeHtml(item.reps)} reps, ${item.sets} sets`)
        .join("<br>");
      const run = record.running
        ? `<br><strong>🏃 ${escapeHtml(record.running.name || "Run")}</strong>: ${escapeHtml(record.running.duration || "-")} min · ${escapeHtml(displaySpeedWithUnit(record.running.speed))} · Distance: ${escapeHtml(record.running.distance || "-")} · Zone: ${escapeHtml(record.running.zone || "-")}`
        : "";
      const addons = (record.addons || []).map(addon => {
        const speed = addon.speed ? ` Â· ${escapeHtml(displaySpeedWithUnit(addon.speed))}` : "";
        return `<br><strong>${escapeHtml(addon.icon || "")} ${escapeHtml(addon.name || "Cardio")}</strong>: ${escapeHtml(addon.duration || "-")} min${speed} Â· Distance: ${escapeHtml(addon.distance || "-")} Â· Zone: ${escapeHtml(addon.zone || "-")}`;
      }).join("");
      return `${strength}${run}${addons}`;
    }

    function bindProgressEvents() {
      document.querySelector("#exportData")?.addEventListener("click", exportDataByEmail);

      document.querySelectorAll("[data-calendar-shift]").forEach(button => {
        button.addEventListener("click", event => {
          const shift = Number(event.currentTarget.dataset.calendarShift || 0);
          calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth() + shift, 1);
          renderProgress();
        });
      });

      document.querySelector("[data-calendar-today]")?.addEventListener("click", () => {
        const now = new Date();
        calendarCursor = new Date(now.getFullYear(), now.getMonth(), 1);
        renderProgress();
      });

      document.querySelectorAll("[data-edit-record]").forEach(button => {
        button.addEventListener("click", event => {
          editHistoryRecord(event.currentTarget.dataset.editRecord);
        });
      });

      document.querySelectorAll("[data-delete-record]").forEach(button => {
        button.addEventListener("click", event => {
          const recordId = event.currentTarget.dataset.deleteRecord;
          const record = data.history.find(item => item.id === recordId);
          if (!record) return;
          if (confirm(`Delete ${getSessionDisplayName(record)} from ${record.date}?`)) {
            data.history = data.history.filter(item => item.id !== recordId);
            if (!data.history.length) data.lastSavedAt = "";
            saveData();
            renderAll();
          }
        });
      });

      document.querySelector("#resetData")?.addEventListener("click", () => {
        if (confirm("Reset all saved sessions?")) {
          data = createDefaultData();
          sessionScreen = "weeks";
          saveData();
          renderAll();
        }
      });
    }

    function updateNav() {
      document.querySelectorAll(".view").forEach(view => view.classList.remove("active"));
      document.querySelector(`#view-${activeTab}`).classList.add("active");
      document.querySelectorAll(".nav-btn").forEach(button => {
        button.classList.toggle("active", button.dataset.tab === activeTab);
      });
    }

    document.querySelectorAll("[data-tab]").forEach(button => {
      button.addEventListener("click", () => {
        activeTab = button.dataset.tab;
        updateNav();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    renderAll();
  </script>
</body>
</html>
