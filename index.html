<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Training Program</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f5;
      --surface: #ffffff;
      --surface-soft: #eef3ef;
      --surface-strong: #e4ece6;
      --text: #171b1f;
      --muted: #66707a;
      --line: #d9e0da;
      --accent: #157c65;
      --accent-soft: #dff4eb;
      --accent-strong: #0f5f4d;
      --warning: #9a650e;
      --danger: #b83a3a;
      --shadow: 0 16px 36px rgba(32, 45, 37, .10);
      --radius: 8px;
      --nav-height: 74px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(21, 124, 101, .12), transparent 26rem),
        linear-gradient(180deg, #fbfcfa, var(--bg) 64%, #eef1ed);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    input {
      width: 100%;
      min-height: 46px;
      padding: .72rem .78rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(21, 124, 101, .12);
    }

    input[readonly] {
      color: var(--muted);
      background: var(--surface-soft);
    }

    input[type="checkbox"] {
      width: 1.2rem;
      min-height: auto;
      accent-color: var(--accent);
    }

    label {
      display: grid;
      gap: .35rem;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.25;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .app {
      width: min(1000px, 100%);
      margin: 0 auto;
      padding: 1rem 1rem calc(var(--nav-height) + 1rem);
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 0 -1rem 1rem;
      padding: .8rem 1rem;
      border-bottom: 1px solid rgba(23, 27, 31, .08);
      background: rgba(251, 252, 250, .9);
      backdrop-filter: blur(16px);
    }

    .top strong {
      display: block;
      font-size: 1rem;
    }

    .top span {
      color: var(--muted);
      font-size: .78rem;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .hero {
      display: grid;
      gap: .8rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #ffffff, #eef6f1);
      box-shadow: var(--shadow);
    }

    .hero h1 {
      max-width: 13ch;
      font-size: clamp(1.6rem, 8vw, 2.35rem);
      line-height: 1;
    }

    .hero p {
      color: var(--muted);
      line-height: 1.45;
    }

    .grid {
      display: grid;
      gap: .8rem;
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin: 1.15rem 0 .65rem;
    }

    .section-title h2 {
      font-size: 1.06rem;
    }

    .muted,
    .fine {
      color: var(--muted);
    }

    .fine {
      font-size: .82rem;
      line-height: 1.45;
    }

    .card {
      padding: .9rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 10px 24px rgba(32, 45, 37, .08);
    }

    .session-card,
    .week-card {
      display: grid;
      gap: .65rem;
      text-align: left;
      color: inherit;
      width: 100%;
    }

    .session-card:hover,
    .week-card:hover,
    .week-card.current {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(21, 124, 101, .10);
    }

    .session-card.done {
      border-color: rgba(21, 124, 101, .45);
      background: linear-gradient(135deg, #ffffff, var(--accent-soft));
    }

    .session-head,
    .exercise-head,
    .progress-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: .8rem;
    }

    .sport-icon {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--accent-soft);
      font-size: 1.25rem;
    }

    .done-check {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: .42rem;
      min-height: 36px;
      color: var(--text);
      font-size: .84rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: .42rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: .36rem .55rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: .78rem;
      white-space: nowrap;
    }

    .pill.good {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 800;
    }

    .pill.warn {
      color: var(--warning);
      border-color: rgba(154, 101, 14, .3);
      background: #fff6df;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      padding: .8rem .95rem;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-weight: 850;
    }

    .btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn.danger {
      background: var(--danger);
      color: white;
    }

    .exercise {
      display: grid;
      gap: .75rem;
      padding: .9rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr .75fr;
      gap: .55rem;
      align-items: end;
    }

    .activity-fields {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: .55rem;
      align-items: end;
    }

    .notice {
      padding: .8rem;
      border: 1px solid rgba(21, 124, 101, .22);
      border-radius: var(--radius);
      background: var(--accent-soft);
      color: var(--text);
      line-height: 1.45;
    }

    .progress-bar {
      width: 100%;
      height: .7rem;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-strong);
    }

    .progress-bar span {
      display: block;
      width: var(--value, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #50b58e);
      transition: width .2s ease;
    }

    .empty {
      padding: 1.1rem;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
      background: rgba(255, 255, 255, .6);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: .55rem;
    }

    .stat {
      display: grid;
      gap: .18rem;
      min-height: 74px;
      align-content: center;
      padding: .7rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .stat small {
      color: var(--muted);
      font-size: .72rem;
    }

    .stat strong {
      font-size: 1.12rem;
      line-height: 1.1;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      padding: .65rem;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: var(--surface-soft);
      font-size: .78rem;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      padding: .45rem .7rem calc(.45rem + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(23, 27, 31, .08);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(16px);
    }

    .bottom-nav-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      width: min(560px, 100%);
      margin: 0 auto;
    }

    .nav-btn {
      min-height: 56px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-weight: 850;
    }

    .nav-btn.active {
      color: #fff;
      background: var(--accent);
    }

    .actions {
      position: sticky;
      bottom: calc(var(--nav-height) + .7rem);
      z-index: 4;
      padding-top: .5rem;
      background: linear-gradient(180deg, transparent, var(--bg) 28%);
    }

    @media (max-width: 430px) {
      .fields,
      .activity-fields,
      .summary {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 760px) {
      .app {
        padding-inline: 1.4rem;
      }

      .top {
        margin-inline: -1.4rem;
        padding-inline: 1.4rem;
      }

      .hero {
        grid-template-columns: 1fr 1fr;
        align-items: end;
      }

      .sessions-grid,
      .progress-grid,
      .week-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .btn {
        width: auto;
      }
    }

    @media (min-width: 1040px) {
      .week-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <strong>Training Program</strong>
      <span>2026 weeks, simple sessions, clear progress</span>
    </header>

    <main>
      <section class="view active" id="view-session"></section>
      <section class="view" id="view-progress"></section>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Navigation">
    <div class="bottom-nav-inner">
      <button class="nav-btn active" type="button" data-tab="session">Session</button>
      <button class="nav-btn" type="button" data-tab="progress">Progress</button>
    </div>
  </nav>

  <script>
    const STORAGE_KEY = "programmeSportSimple.v2";
    const PROGRAM_START = new Date(2026, 4, 25);
    const PROGRAM_LAST_WEEK_START = new Date(2026, 11, 28);

    const SESSIONS = [
      {
        id: "upperA",
        type: "strength",
        icon: "🏋️‍♀️🏃",
        name: "Upper Body A + Quality Run",
        duration: "55 to 60 min + 25 to 30 min run",
        focus: "Back, shoulders, arms, abs",
        note: "The quality run is done after strength training.",
        exercises: [
          exercise("latPulldown", "Lat pulldown", 3, "25", 8, "8 to 12"),
          exercise("seatedRow", "Seated row", 3, "20", 8, "8 to 12"),
          exercise("chestPress", "Chest press machine", 3, "", 8, "8 to 12"),
          exercise("shoulderPress", "Shoulder press machine", 3, "7,5", 8, "8 to 12"),
          exercise("facePull", "Seated face pull", 3, "17,5", 12, "12 to 15"),
          exercise("cableCurls", "Cable curls", 3, "7,5", 10, "10 to 15"),
          exercise("cableCrunch", "Cable crunch", 3, "", 10, "10 to 15")
        ]
      },
      {
        id: "lowerA",
        type: "strength",
        icon: "🏋️‍♀️",
        name: "Lower Body A",
        duration: "60 to 70 min",
        focus: "Glutes and quads",
        note: "Priority session for body recomposition.",
        exercises: [
          exercise("hipThrustA", "Machine or barbell hip thrust", 4, "", 8, "8 to 12"),
          exercise("legPress", "Leg press", 3, "", 8, "8 to 12"),
          exercise("bulgarianSplitSquat", "Bulgarian split squat or lunges", 3, "", 8, "8 to 10 per leg"),
          exercise("legExtension", "Leg extension", 3, "", 10, "10 to 15"),
          exercise("abductionA", "Abduction machine", 3, "", 15, "15 to 20"),
          exercise("calves", "Calf raises", 3, "", 10, "10 to 15"),
          exercise("cableCrunch", "Cable crunch", 3, "", 10, "10 to 15")
        ]
      },
      {
        id: "upperB",
        type: "strength",
        icon: "🏋️‍♀️🏃",
        name: "Upper Body B + Easy Run",
        duration: "55 to 60 min + 25 to 30 min run",
        focus: "Shoulders, back, chest, triceps, abs",
        note: "The easy run stays conversational and is done after strength training.",
        exercises: [
          exercise("shoulderPress", "Shoulder press machine", 3, "7,5", 8, "8 to 12"),
          exercise("inclineChestPress", "Chest press or incline press machine", 3, "", 8, "8 to 12"),
          exercise("latPulldown", "Lat pulldown", 3, "25", 10, "10 to 12"),
          exercise("seatedRow", "Seated row", 3, "20", 10, "10 to 12"),
          exercise("lateralRaise", "Lateral raises", 3, "", 12, "12 to 20"),
          exercise("tricepsPulley", "Cable triceps pushdown", 3, "", 10, "10 to 15"),
          exercise("cableCrunch", "Cable crunch", 3, "", 10, "10 to 15")
        ]
      },
      {
        id: "lowerB",
        type: "strength",
        icon: "🏋️‍♀️",
        name: "Lower Body B",
        duration: "60 to 70 min",
        focus: "Glutes, hamstrings, posterior chain",
        note: "Priority session with gradual progression.",
        exercises: [
          exercise("romanianDeadlift", "Dumbbell Romanian deadlift", 3, "", 8, "8 to 10"),
          exercise("hipThrustB", "Hip thrust or glute bridge", 3, "", 10, "10 to 12"),
          exercise("legCurl", "Leg curl", 3, "", 10, "10 to 15"),
          exercise("cableKickback", "Cable kickback", 3, "", 12, "12 to 15 per leg"),
          exercise("backExtension", "Back extension", 3, "", 10, "10 to 15"),
          exercise("abductionB", "Abduction machine", 3, "", 15, "15 to 20"),
          exercise("cableCrunch", "Cable crunch", 3, "", 10, "10 to 15")
        ]
      },
      {
        id: "swim50",
        type: "activity",
        icon: "🏊",
        name: "Swimming",
        duration: "50 min",
        focus: "Technique, breathing, easy endurance",
        note: "Simply log duration, estimated distance, and effort.",
        defaults: { duration: "50", distance: "", effort: "" }
      },
      {
        id: "bike30",
        type: "activity",
        icon: "🚴",
        name: "Cycling",
        duration: "30 min",
        focus: "Easy to moderate cardio",
        note: "Short session: keep the intensity recovery-friendly.",
        defaults: { duration: "30", distance: "", effort: "" }
      }
    ];

    const EXERCISE_MUSCLES = {
      latPulldown: { back: 1 },
      seatedRow: { back: 1 },
      chestPress: { chest: 1, shoulders: 0.25, arms: 0.25 },
      inclineChestPress: { chest: 1, shoulders: 0.25, arms: 0.25 },
      shoulderPress: { shoulders: 1, arms: 0.25 },
      facePull: { back: 0.5, shoulders: 0.5 },
      cableCurls: { arms: 1 },
      cableCrunch: { abs: 1 },
      hipThrustA: { glutes: 1, hamstrings: 0.5 },
      hipThrustB: { glutes: 1, hamstrings: 0.5 },
      legPress: { quads: 1, glutes: 0.5 },
      bulgarianSplitSquat: { glutes: 0.75, quads: 0.75 },
      legExtension: { quads: 1 },
      abductionA: { glutes: 1 },
      abductionB: { glutes: 1 },
      calves: { calves: 1 },
      romanianDeadlift: { hamstrings: 1, glutes: 0.75 },
      legCurl: { hamstrings: 1 },
      cableKickback: { glutes: 1 },
      backExtension: { hamstrings: 0.5, glutes: 0.5, back: 0.25 },
      lateralRaise: { shoulders: 1 },
      tricepsPulley: { arms: 1 }
    };

    const MUSCLE_TARGETS = [
      { id: "glutes", label: "Glutes", min: 10, max: 20 },
      { id: "quads", label: "Quads", min: 8, max: 16 },
      { id: "hamstrings", label: "Hamstrings", min: 8, max: 16 },
      { id: "back", label: "Back", min: 10, max: 18 },
      { id: "abs", label: "Abs", min: 6, max: 12 },
      { id: "shoulders", label: "Shoulders", min: 6, max: 14 },
      { id: "chest", label: "Chest", min: 6, max: 12 },
      { id: "arms", label: "Arms", min: 4, max: 12 },
      { id: "calves", label: "Calves", min: 4, max: 10 }
    ];

    const LOAD_STEP_RULES = {
      lower: 2.5,
      upper: 1.25,
      isolation: 1,
      bodyweight: 0
    };

    function exercise(id, name, sets, defaultWeight, defaultReps, repRange) {
      return { id, name, sets, defaultWeight, defaultReps, repRange };
    }

    function createDefaultData() {
      return {
        selectedWeekId: "",
        selectedSessionId: "",
        currentEntries: {},
        completed: {},
        completionHydrated: false,
        history: [],
        lastSavedAt: ""
      };
    }

    const weeks = generateWeeks();
    let data = loadData();
    hydrateCompletionFromHistory();
    let activeTab = "session";
    let sessionScreen = "weeks";

    function loadData() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return { ...createDefaultData(), ...(saved || {}) };
      } catch (error) {
        return createDefaultData();
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function addDays(date, amount) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + amount);
      return copy;
    }

    function toIsoDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatShortDate(date) {
      return date.toLocaleDateString("en-GB", { day: "2-digit", month: "2-digit" });
    }

    function generateWeeks() {
      const list = [];
      let current = new Date(PROGRAM_START);
      let index = 1;
      while (current <= PROGRAM_LAST_WEEK_START) {
        const start = new Date(current);
        const end = addDays(start, 6);
        end.setHours(23, 59, 59, 999);
        const id = toIsoDate(start);
        list.push({
          id,
          index,
          start,
          end,
          label: `Week ${index}`,
          range: `${formatShortDate(start)} to ${formatShortDate(end)}`
        });
        current = addDays(current, 7);
        index += 1;
      }
      return list;
    }

    function getCurrentProgramWeek() {
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      return weeks.find(week => now >= week.start && now <= week.end);
    }

    function getSelectedWeek() {
      return weeks.find(week => week.id === data.selectedWeekId);
    }

    function getSession(sessionId) {
      return SESSIONS.find(session => session.id === sessionId);
    }

    function getExerciseDisplayName(item) {
      const exercise = SESSIONS.flatMap(session => session.exercises || []).find(entry => entry.id === item.id);
      return exercise?.name || item.name;
    }

    function getSessionDisplayName(record) {
      return getSession(record.sessionId)?.name || record.sessionName || "Session";
    }

    function getWeekDisplayLabel(record) {
      const week = weeks.find(entry => entry.id === record.weekId);
      return week ? `${week.label} · ${week.range}` : "Unassigned";
    }

    function hydrateCompletionFromHistory() {
      if (data.completionHydrated) return;
      data.completed = data.completed || {};
      data.history.forEach(record => {
        if (record.weekId && record.sessionId) {
          markSessionDone(record.weekId, record.sessionId, true, false);
        }
      });
      data.completionHydrated = true;
      saveData();
    }

    function markSessionDone(weekId, sessionId, done, persist = true) {
      data.completed = data.completed || {};
      if (!data.completed[weekId]) data.completed[weekId] = {};
      if (done) data.completed[weekId][sessionId] = true;
      else delete data.completed[weekId][sessionId];
      if (persist) saveData();
    }

    function isSessionDone(weekId, sessionId) {
      return Boolean(data.completed?.[weekId]?.[sessionId]);
    }

    function getWeekCompletion(weekId) {
      const done = SESSIONS.filter(session => isSessionDone(weekId, session.id)).length;
      const total = SESSIONS.length;
      return {
        done,
        total,
        complete: done === total,
        percent: total ? Math.round((done / total) * 100) : 0
      };
    }

    function getVolumeWeekId() {
      return data.selectedWeekId || getCurrentProgramWeek()?.id || data.history[0]?.weekId || weeks[0]?.id || "";
    }

    function getWeeklyMuscleVolume(weekId) {
      const totals = Object.fromEntries(MUSCLE_TARGETS.map(muscle => [muscle.id, 0]));
      const records = data.history.filter(record => record.weekId === weekId);
      const savedSessionIds = new Set(records.map(record => record.sessionId));
      const addExerciseSets = item => {
        const muscles = EXERCISE_MUSCLES[item.id] || {};
        Object.entries(muscles).forEach(([muscleId, share]) => {
          totals[muscleId] = (totals[muscleId] || 0) + Number(item.sets || 0) * share;
        });
      };

      records.forEach(record => (record.exercises || []).forEach(addExerciseSets));
      SESSIONS
        .filter(session => session.type === "strength" && isSessionDone(weekId, session.id) && !savedSessionIds.has(session.id))
        .forEach(session => session.exercises.forEach(addExerciseSets));

      return MUSCLE_TARGETS.map(target => {
        const sets = Number((totals[target.id] || 0).toFixed(1));
        return {
          ...target,
          sets,
          percent: Math.min(100, Math.round((sets / target.max) * 100)),
          status: sets < target.min ? "Low" : sets <= target.max ? "Productive" : "High"
        };
      });
    }

    function today() {
      return toIsoDate(new Date());
    }

    function downloadJson(payload, filename) {
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function openExportEmail(payload, filename) {
      const subject = `Training data export - ${today()}`;
      const shortPayload = payload.length <= 1400;
      const body = [
        "Hello,",
        "",
        "Here is my training data export.",

          ? `JSON data:\n\n${payload}`
          : `The file ${filename} has just been downloaded. Please attach it to this email.`,
        "",
        "Note: the app stores data locally in the browser."
      ].join("\n");

      window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }

    function exportDataByEmail() {
      const payload = JSON.stringify(data, null, 2);
      const filename = `training-progress-${today()}.json`;
      downloadJson(payload, filename);
      window.setTimeout(() => openExportEmail(payload, filename), 150);
    }

    function makeId() {
      return window.crypto && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function numericWeight(value) {
      const normalized = String(value ?? "").replace(",", ".").replace(/[^\d.]/g, "");
      const parsed = Number(normalized);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function formatDecimalComma(value) {
      if (!Number.isFinite(value)) return "";
      return Number(value.toFixed(2)).toString().replace(".", ",");
    }

    function normalizeWeightInput(value) {
      const raw = String(value ?? "").replace(".", ",").replace(/[^\d,]/g, "");
      const parts = raw.split(",");
      if (parts.length <= 1) return parts[0] || "";
      return `${parts[0]},${parts.slice(1).join("")}`;
    }

    function displayLoadWithUnit(value, emptyText = "-") {
      const normalized = normalizeWeightInput(value);
      return normalized ? `${normalized} kg` : emptyText;
    }

    function numericValue(value) {
      const parsed = Number(String(value ?? "").replace(",", ".").match(/\d+(\.\d+)?/)?.[0] || 0);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function parseRepRange(repRange) {
      const values = String(repRange || "").match(/\d+(\.\d+)?/g)?.map(Number) || [];
      return { min: values[0] || 8, max: values[1] || values[0] || 12 };
    }

    function getExerciseLogs(exerciseId) {
      return [...data.history]
        .reverse()
        .flatMap(record => (record.exercises || [])
          .filter(item => item.id === exerciseId)
          .map(item => ({ ...item, date: record.date, weekId: record.weekId })))
        .filter(item => numericWeight(item.weight) > 0 && numericValue(item.reps) > 0);
    }

    function estimateOneRepMax(weight, reps) {
      return weight * (1 + reps / 30);
    }

    function classifyExerciseForLoad(exerciseId) {
      if (["hipThrustA", "hipThrustB", "legPress", "bulgarianSplitSquat", "romanianDeadlift"].includes(exerciseId)) return "lower";
      if (["latPulldown", "seatedRow", "chestPress", "shoulderPress", "inclineChestPress"].includes(exerciseId)) return "upper";
      if (["deadBug", "sidePlank"].includes(exerciseId)) return "bodyweight";
      return "isolation";
    }

    function roundToLoadStep(value, step) {
      if (!step || !Number.isFinite(value)) return value;
      return Math.max(step, Math.round(value / step) * step);
    }

    function formatLoad(value) {
      if (!Number.isFinite(value) || value <= 0) return "";
      return formatDecimalComma(value);
    }

    function suggestNextLoad(exercise) {
      const logs = getExerciseLogs(exercise.id);
      const defaultWeight = exercise.defaultWeight;
      const range = parseRepRange(exercise.repRange);
      const step = LOAD_STEP_RULES[classifyExerciseForLoad(exercise.id)] ?? 1.25;

      if (!logs.length) {
        return {
          weight: defaultWeight,
          title: "Start here",
          detail: defaultWeight
            ? `No previous data yet. Use ${displayLoadWithUnit(defaultWeight)}, aim for ${exercise.repRange}, and save the session.`
            : `No previous data yet. Enter a load in kg, aim for ${exercise.repRange}, and save the session.`
        };
      }

      const last = logs[logs.length - 1];
      const lastWeight = numericWeight(last.weight);
      const lastReps = numericValue(last.reps);
      const e1rm = estimateOneRepMax(lastWeight, lastReps);
      const recent = logs.slice(-3);
      const recentE1rm = recent.map(item => estimateOneRepMax(numericWeight(item.weight), numericValue(item.reps)));
      const trend = recentE1rm.length >= 2 ? recentE1rm[recentE1rm.length - 1] - recentE1rm[0] : 0;

      if (!lastWeight || !lastReps) {
        return {
          weight: defaultWeight,
          title: "Calibrate",
          detail: defaultWeight
            ? `Previous data is incomplete. Use ${displayLoadWithUnit(defaultWeight)} and save weight + reps.`
            : "Previous data is incomplete. Enter a load in kg and save weight + reps."
        };
      }

      if (lastReps >= range.max) {
        const targetE1rm = e1rm * (trend >= 0 ? 1.015 : 1.005);
        const predictedForLowRange = targetE1rm / (1 + range.min / 30);
        const next = roundToLoadStep(Math.max(lastWeight + step, predictedForLowRange), step);
        return {
          weight: formatLoad(next),
          title: "Increase load",
          detail: `Last time: ${displayLoadWithUnit(last.weight)} x ${last.reps}. You reached the top of the range, so try ${displayLoadWithUnit(formatLoad(next))} and rebuild from ${range.min} reps.`
        };
      }

      if (lastReps < range.min) {
        const reduced = roundToLoadStep(lastWeight * 0.95, step);
        return {
          weight: formatLoad(reduced || lastWeight),
          title: "Reduce slightly",
          detail: `Last time: ${displayLoadWithUnit(last.weight)} x ${last.reps}. This is below the range, so use about ${displayLoadWithUnit(formatLoad(reduced || lastWeight))} or keep the same load if technique felt easy.`
        };
      }

      return {
        weight: formatLoad(lastWeight),
        title: "Keep load",
        detail: `Last time: ${displayLoadWithUnit(last.weight)} x ${last.reps}. Keep ${displayLoadWithUnit(formatLoad(lastWeight))} and add reps before increasing.`
      };
    }

    function entryFor(exercise) {
      if (!data.currentEntries[exercise.id]) {
        const suggestion = suggestNextLoad(exercise);
        data.currentEntries[exercise.id] = {
          weight: normalizeWeightInput(suggestion.weight || exercise.defaultWeight),
          reps: String(exercise.defaultReps)
        };
      }
      data.currentEntries[exercise.id].weight = normalizeWeightInput(data.currentEntries[exercise.id].weight);
      return data.currentEntries[exercise.id];
    }

    function activityEntryFor(session) {
      if (!data.currentEntries.activity) {
        data.currentEntries.activity = { ...session.defaults };

      return data.currentEntries.activity;
    }

    function saveWorkout() {

        sessionId: session.id,
        sessionName: session.name,

        exercises: [],
        activity: null

      if (session.type === "strength") {
        record.exercises = session.exercises.map(item => {
          const entry = entryFor(item);
          return {
            id: item.id,
            name: item.name,
            sets: item.sets,
            reps: entry.reps,
            weight: normalizeWeightInput(entry.weight),
            repRange: item.repRange
          };
        });
      } else {
        const entry = activityEntryFor(session);
        record.activity = {
          duration: entry.duration,
          distance: entry.distance,
          effort: entry.effort
        };
      }

      data.history.unshift(record);
      markSessionDone(week.id, session.id, true, false);
      data.lastSavedAt = new Date().toISOString();
      data.currentEntries = {};
      data.selectedSessionId = "";

    function getProgressStats() {
      const exerciseMap = new Map();
      const activityMap = new Map();
      let bestVolume = 0;

      [...data.history].reverse().forEach(record => {
        (record.exercises || []).forEach(item => {
          if (!exerciseMap.has(item.id)) {
            exerciseMap.set(item.id, {
              id: item.id,
              name: getExerciseDisplayName(item),
              first: item,
              last: item,
              bestWeight: numericWeight(item.weight),
              bestVolume: 0,
              count: 0,
              records: []
            });
          }

          const current = exerciseMap.get(item.id);
          const weight = numericWeight(item.weight);
          const reps = numericValue(item.reps);
          const volume = weight * reps * Number(item.sets || 0);

          current.last = item;
          current.bestWeight = Math.max(current.bestWeight, weight);
          current.bestVolume = Math.max(current.bestVolume, volume);
          current.count += 1;
          current.records.push({ date: record.date, weekLabel: getWeekDisplayLabel(record), sessionName: getSessionDisplayName(record), ...item, volume });
          bestVolume = Math.max(bestVolume, volume);
        });

        if (record.activity) {
          if (!activityMap.has(record.sessionId)) {
            activityMap.set(record.sessionId, {
              id: record.sessionId,
              icon: record.icon || "",
              name: getSessionDisplayName(record),
              first: record.activity,
              last: record.activity,
              count: 0,
              bestDuration: 0,
              bestDistance: 0
            });
          }
          const current = activityMap.get(record.sessionId);
          current.last = record.activity;
          current.count += 1;
          current.bestDuration = Math.max(current.bestDuration, numericValue(record.activity.duration));
          current.bestDistance = Math.max(current.bestDistance, numericValue(record.activity.distance));
        }
      });

      const exercises = [...exerciseMap.values()].sort((a, b) => a.name.localeCompare(b.name, "en"));
      const activities = [...activityMap.values()].sort((a, b) => a.name.localeCompare(b.name, "en"));
      return { exercises, activities, exerciseCount: exercises.length, activityCount: activities.length, bestVolume };
    }

    function renderExerciseProgress(item) {
      const firstWeight = numericWeight(item.first.weight);
      const lastWeight = numericWeight(item.last.weight);
      const diff = lastWeight - firstWeight;
      const trend = diff > 0 ? `+${formatDecimalComma(diff)} kg` : diff < 0 ? `${formatDecimalComma(diff)} kg` : "stable";
      const trendClass = diff > 0 ? "good" : diff < 0 ? "warn" : "";

      return `
        <article class="card grid">
          <div class="progress-head">
            <div>
              <strong>${item.name}</strong>
              <p class="fine">${item.count} log${item.count > 1 ? "s" : ""}</p>
            </div>
            <span class="pill ${trendClass}">${trend}</span>
          </div>
          <div class="summary">
            <div class="stat"><small>Last weight</small><strong>${escapeHtml(displayLoadWithUnit(item.last.weight))}</strong></div>
            <div class="stat"><small>Last reps</small><strong>${escapeHtml(item.last.reps)}</strong></div>
            <div class="stat"><small>Sets</small><strong>${item.last.sets}</strong></div>
          </div>
          <div class="notice">
            Best logged load: <strong>${item.bestWeight ? `${formatDecimalComma(item.bestWeight)} kg` : escapeHtml(displayLoadWithUnit(item.last.weight))}</strong>.
            ${item.bestVolume ? `Best estimated volume: <strong>${Math.round(item.bestVolume)}</strong>.` : ""}
          </div>
        </article>
      `;
    }

    function renderMuscleVolumeCard(item) {
      const statusClass = item.status === "Productive" ? "good" : item.status === "High" ? "warn" : "";
      const message = item.status === "Low"
        ? "Below the target range."
        : item.status === "High"
          ? "Above the target range. Watch recovery."
          : "Inside the target range.";

      return `
        <article class="card grid">
          <div class="progress-head">
            <div>
              <strong>${item.label}</strong>
              <p class="fine">Target: ${item.min} to ${item.max} sets/week</p>
            </div>
            <span class="pill ${statusClass}">${item.status}</span>
          </div>
          <div class="progress-bar" aria-label="${item.label} weekly volume"><span style="--value:${item.percent}%"></span></div>
          <div class="summary">
            <div class="stat"><small>This week</small><strong>${item.sets}</strong></div>
            <div class="stat"><small>Minimum</small><strong>${item.min}</strong></div>
            <div class="stat"><small>Upper guide</small><strong>${item.max}</strong></div>
          </div>
          <p class="fine">${message}</p>
        </article>
      `;
    }

    function renderActivityProgress(item) {
      return `
        <article class="card grid">
          <div class="progress-head">
            <div>
              <strong>${item.icon} ${item.name}</strong>
              <p class="fine">${item.count} session${item.count > 1 ? "s" : ""}</p>
            </div>
            <span class="pill good">${escapeHtml(item.last.duration || "-")} min</span>
          </div>
          <div class="summary">
            <div class="stat"><small>Last duration</small><strong>${escapeHtml(item.last.duration || "-")}</strong></div>
            <div class="stat"><small>Last distance</small><strong>${escapeHtml(item.last.distance || "-")}</strong></div>
            <div class="stat"><small>Effort</small><strong>${escapeHtml(item.last.effort || "-")}</strong></div>
          </div>
          <div class="notice">Best logged duration: <strong>${item.bestDuration || "-"} min</strong>${item.bestDistance ? ` · max distance: <strong>${item.bestDistance}</strong>` : ""}.</div>
        </article>
      `;
    }

    function renderHistoryTable() {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Week</th>
                <th>Date</th>
                <th>Session</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody>
              ${data.history.slice(0, 24).map(record => `
                <tr>
                  <td>${escapeHtml(getWeekDisplayLabel(record))}</td>
                  <td>${record.date}</td>
                  <td>${escapeHtml(`${record.icon || ""} ${getSessionDisplayName(record)}`)}</td>
                  <td>${renderRecordDetail(record)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderRecordDetail(record) {
      if (record.activity) {
        return `Duration: ${escapeHtml(record.activity.duration || "-")} min · Distance: ${escapeHtml(record.activity.distance || "-")} · Effort: ${escapeHtml(record.activity.effort || "-")}/10`;
      }
      return (record.exercises || [])
        .map(item => `${escapeHtml(getExerciseDisplayName(item))}: ${escapeHtml(displayLoadWithUnit(item.weight))}, ${escapeHtml(item.reps)} reps, ${item.sets} sets`)
        .join("<br>");
    }

    function bindProgressEvents() {
      document.querySelector("#exportData")?.addEventListener("click", exportDataByEmail);

      document.querySelector("#resetData")?.addEventListener("click", () => {
        if (confirm("Reset all saved sessions?")) {
          data = createDefaultData();
          sessionScreen = "weeks";
          saveData();
          renderAll();
        }
      });
    }

    function updateNav() {
      document.querySelectorAll(".view").forEach(view => view.classList.remove("active"));
      document.querySelector(`#view-${activeTab}`).classList.add("active");
      document.querySelectorAll(".nav-btn").forEach(button => {
        button.classList.toggle("active", button.dataset.tab === activeTab);
      });
    }

    document.querySelectorAll("[data-tab]").forEach(button => {
      button.addEventListener("click", () => {
        activeTab = button.dataset.tab;
        updateNav();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    renderAll();
  </script>
</body>
</html>
