<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Programme sport</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --surface: #191b20;
      --card: #22262e;
      --card-soft: #2a2f39;
      --text: #f6f7f9;
      --muted: #aeb5c0;
      --line: #3a414d;
      --accent: #6fd6b3;
      --accent-strong: #46bd99;
      --warning: #f1c36d;
      --danger: #ff7b7b;
      --shadow: 0 18px 40px rgba(0, 0, 0, .28);
      --radius: 8px;
      --nav-height: 74px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(111, 214, 179, .1), transparent 28rem),
        linear-gradient(180deg, #101114, #0c0d10 110%);
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    input {
      width: 100%;
      min-height: 46px;
      padding: .72rem .78rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card-soft);
      color: var(--text);
      outline: none;
    }

    input[readonly] {
      color: var(--muted);
      background: #1b1e24;
    }

    label {
      display: grid;
      gap: .35rem;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.25;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 1rem 1rem calc(var(--nav-height) + 1rem);
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 0 -1rem 1rem;
      padding: .8rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      background: rgba(16, 17, 20, .86);
      backdrop-filter: blur(16px);
    }

    .top strong {
      display: block;
      font-size: 1rem;
    }

    .top span {
      color: var(--muted);
      font-size: .78rem;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .hero {
      display: grid;
      gap: .8rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #20252d, #171a20);
      box-shadow: var(--shadow);
    }

    .hero h1 {
      max-width: 12ch;
      font-size: clamp(1.6rem, 8vw, 2.35rem);
      line-height: 1;
    }

    .hero p {
      color: var(--muted);
      line-height: 1.45;
    }

    .grid {
      display: grid;
      gap: .8rem;
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin: 1.15rem 0 .65rem;
    }

    .section-title h2 {
      font-size: 1.06rem;
    }

    .muted {
      color: var(--muted);
    }

    .fine {
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.45;
    }

    .card {
      padding: .9rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: 0 10px 24px rgba(0, 0, 0, .15);
    }

    .session-card {
      display: grid;
      gap: .65rem;
      text-align: left;
      color: inherit;
      width: 100%;
    }

    .session-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(111, 214, 179, .16);
    }

    .session-head,
    .exercise-head,
    .progress-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: .8rem;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: .42rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: .36rem .55rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card-soft);
      color: var(--muted);
      font-size: .78rem;
      white-space: nowrap;
    }

    .pill.good {
      color: #07120e;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 800;
    }

    .pill.warn {
      color: var(--warning);
      border-color: rgba(241, 195, 109, .5);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      padding: .8rem .95rem;
      border-radius: var(--radius);
      background: var(--accent);
      color: #07120e;
      font-weight: 850;
    }

    .btn.secondary {
      background: var(--card-soft);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn.danger {
      background: var(--danger);
      color: white;
    }

    .exercise {
      display: grid;
      gap: .75rem;
      padding: .9rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr .75fr;
      gap: .55rem;
      align-items: end;
    }

    .notice {
      padding: .8rem;
      border: 1px solid rgba(111, 214, 179, .4);
      border-radius: var(--radius);
      background: rgba(111, 214, 179, .1);
      color: var(--text);
      line-height: 1.45;
    }

    .empty {
      padding: 1.1rem;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: .55rem;
    }

    .stat {
      display: grid;
      gap: .18rem;
      min-height: 74px;
      align-content: center;
      padding: .7rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card-soft);
    }

    .stat small {
      color: var(--muted);
      font-size: .72rem;
    }

    .stat strong {
      font-size: 1.15rem;
      line-height: 1.1;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    table {
      width: 100%;
      min-width: 520px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: .65rem;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: var(--card-soft);
      font-size: .78rem;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      padding: .45rem .7rem calc(.45rem + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255, 255, 255, .08);
      background: rgba(16, 17, 20, .9);
      backdrop-filter: blur(16px);
    }

    .bottom-nav-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      width: min(560px, 100%);
      margin: 0 auto;
    }

    .nav-btn {
      min-height: 56px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-weight: 850;
    }

    .nav-btn.active {
      color: #07120e;
      background: var(--accent);
    }

    .actions {
      position: sticky;
      bottom: calc(var(--nav-height) + .7rem);
      z-index: 4;
      padding-top: .5rem;
      background: linear-gradient(180deg, transparent, #101114 28%);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 390px) {
      .fields,
      .summary {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 760px) {
      .app {
        padding-inline: 1.4rem;
      }

      .top {
        margin-inline: -1.4rem;
        padding-inline: 1.4rem;
      }

      .hero {
        grid-template-columns: 1fr 1fr;
        align-items: end;
      }

      .sessions-grid,
      .progress-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .btn {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <strong>Programme sport</strong>
      <span>Choisir une séance, noter poids et répétitions, suivre la progression</span>
    </header>

    <main>
      <section class="view active" id="view-session"></section>
      <section class="view" id="view-progress"></section>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Navigation">
    <div class="bottom-nav-inner">
      <button class="nav-btn active" type="button" data-tab="session">Séance</button>
      <button class="nav-btn" type="button" data-tab="progress">Progression</button>
    </div>
  </nav>

  <script>
    const STORAGE_KEY = "programmeSportSimple.v1";

    const SESSIONS = [
      {
        id: "upperA",
        name: "Haut du corps A + course qualitative",
        duration: "55 à 60 min + 25 à 30 min course",
        focus: "Dos, épaules, bras, abdos anti-rotation",
        note: "La course qualitative se fait après la musculation.",
        exercises: [
          exercise("latPulldown", "Lat pulldown", 3, "25 kg", 8, "8 à 12"),
          exercise("seatedRow", "Seated row", 3, "20 kg", 8, "8 à 12"),
          exercise("chestPress", "Chest press machine", 3, "à calibrer", 8, "8 à 12"),
          exercise("shoulderPress", "Shoulder press machine", 3, "7,5 kg", 8, "8 à 12"),
          exercise("facePull", "Face pull assis", 3, "17,5 kg", 12, "12 à 15"),
          exercise("cableCurls", "Cable curls", 3, "7,5 kg", 10, "10 à 15"),
          exercise("pallofPress", "Pallof press ou gainage anti-rotation", 3, "léger/modéré", 10, "10 à 12 par côté")
        ]
      },
      {
        id: "lowerA",
        name: "Bas du corps A",
        duration: "60 à 70 min",
        focus: "Fessiers et quadriceps",
        note: "Séance prioritaire pour la recomposition.",
        exercises: [
          exercise("hipThrustA", "Hip thrust machine ou barre", 4, "à calibrer", 8, "8 à 12"),
          exercise("legPress", "Presse à cuisses", 3, "à calibrer", 8, "8 à 12"),
          exercise("bulgarianSplitSquat", "Bulgarian split squat ou fentes", 3, "à calibrer", 8, "8 à 10 par jambe"),
          exercise("legExtension", "Leg extension", 3, "à calibrer", 10, "10 à 15"),
          exercise("abductionA", "Abduction machine", 3, "à calibrer", 15, "15 à 20"),
          exercise("calves", "Mollets", 3, "à calibrer", 10, "10 à 15"),
          exercise("deadBug", "Dead bug ou planche", 3, "poids du corps", "10 ou 30 sec", "10 à 12 par côté ou 30 à 45 sec")
        ]
      },
      {
        id: "upperB",
        name: "Haut du corps B + course facile",
        duration: "55 à 60 min + 25 à 30 min course",
        focus: "Épaules, dos, pectoraux, triceps, abdos",
        note: "La course facile reste en aisance respiratoire après la musculation.",
        exercises: [
          exercise("shoulderPress", "Shoulder press machine", 3, "7,5 kg", 8, "8 à 12"),
          exercise("inclineChestPress", "Chest press ou développé incliné machine", 3, "à calibrer", 8, "8 à 12"),
          exercise("latPulldown", "Lat pulldown", 3, "25 kg", 10, "10 à 12"),
          exercise("seatedRow", "Seated row", 3, "20 kg", 10, "10 à 12"),
          exercise("lateralRaise", "Élévations latérales", 3, "à calibrer", 12, "12 à 20"),
          exercise("tricepsPulley", "Triceps poulie", 3, "à calibrer", 10, "10 à 15"),
          exercise("cableCrunch", "Cable crunch", 3, "à calibrer", 10, "10 à 15")
        ]
      },
      {
        id: "lowerB",
        name: "Bas du corps B",
        duration: "60 à 70 min",
        focus: "Fessiers, ischios et chaîne postérieure",
        note: "Séance prioritaire, progression graduelle.",
        exercises: [
          exercise("romanianDeadlift", "Soulevé de terre roumain avec haltères", 3, "à calibrer", 8, "8 à 10"),
          exercise("hipThrustB", "Hip thrust ou glute bridge", 3, "à calibrer", 10, "10 à 12"),
          exercise("legCurl", "Leg curl", 3, "à calibrer", 10, "10 à 15"),
          exercise("cableKickback", "Cable kickback", 3, "à calibrer", 12, "12 à 15 par jambe"),
          exercise("backExtension", "Back extension", 3, "à calibrer", 10, "10 à 15"),
          exercise("abductionB", "Abduction machine", 3, "à calibrer", 15, "15 à 20"),
          exercise("sidePlank", "Gainage latéral", 3, "poids du corps", "30 sec", "30 à 45 sec par côté")
        ]
      }
    ];

    function exercise(id, name, sets, defaultWeight, defaultReps, repRange) {
      return { id, name, sets, defaultWeight, defaultReps, repRange };
    }

    function createDefaultData() {
      return {
        selectedSessionId: "",
        currentEntries: {},
        history: [],
        lastSavedAt: ""
      };
    }

    let data = loadData();
    let activeTab = "session";

    function loadData() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return { ...createDefaultData(), ...(saved || {}) };
      } catch (error) {
        return createDefaultData();
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getSession(sessionId) {
      return SESSIONS.find(session => session.id === sessionId);
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function makeId() {
      return window.crypto && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function numericWeight(value) {
      const normalized = String(value ?? "").replace(",", ".").replace(/[^\d.]/g, "");
      const parsed = Number(normalized);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function numericReps(value) {
      const parsed = Number(String(value ?? "").replace(",", ".").match(/\d+(\.\d+)?/)?.[0] || 0);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function entryFor(exercise) {
      if (!data.currentEntries[exercise.id]) {
        data.currentEntries[exercise.id] = {
          weight: exercise.defaultWeight,
          reps: String(exercise.defaultReps)
        };
      }
      return data.currentEntries[exercise.id];
    }

    function selectSession(sessionId) {
      data.selectedSessionId = sessionId;
      data.currentEntries = {};
      saveData();
      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function saveWorkout() {
      const session = getSession(data.selectedSessionId);
      if (!session) return;

      const record = {
        id: makeId(),
        date: today(),
        sessionId: session.id,
        sessionName: session.name,
        exercises: session.exercises.map(item => {
          const entry = entryFor(item);
          return {
            id: item.id,
            name: item.name,
            sets: item.sets,
            reps: entry.reps,
            weight: entry.weight,
            repRange: item.repRange
          };
        })
      };

      data.history.unshift(record);
      data.lastSavedAt = new Date().toISOString();
      data.currentEntries = {};
      data.selectedSessionId = "";
      activeTab = "progress";
      saveData();
      renderAll();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderAll() {
      renderSession();
      renderProgress();
      updateNav();
    }

    function renderSession() {
      const session = getSession(data.selectedSessionId);
      document.querySelector("#view-session").innerHTML = session ? renderWorkoutForm(session) : renderSessionPicker();
      bindSessionEvents();
    }

    function renderSessionPicker() {
      return `
        <section class="hero">
          <div>
            <div class="pill-row">
              <span class="pill good">Musculation prioritaire</span>
              <span class="pill">4 séances</span>
            </div>
            <h1>Choisis ta séance</h1>
          </div>
          <p>Vue volontairement simple : tu choisis la séance à faire, puis tu notes seulement le poids, les répétitions et les séries prévues.</p>
        </section>

        <div class="section-title">
          <h2>Séances proposées</h2>
          <span class="fine">Sans indication de jour</span>
        </div>

        <section class="grid sessions-grid">
          ${SESSIONS.map(session => `
            <button class="card session-card" type="button" data-select-session="${session.id}">
              <div class="session-head">
                <div>
                  <strong>${session.name}</strong>
                  <p class="fine">${session.focus}</p>
                </div>
                <span class="pill">${session.exercises.length} exos</span>
              </div>
              <div class="pill-row">
                <span class="pill">${session.duration}</span>
              </div>
              <p class="fine">${session.note}</p>
            </button>
          `).join("")}
        </section>
      `;
    }

    function renderWorkoutForm(session) {
      return `
        <section class="hero">
          <div>
            <button class="btn secondary" type="button" id="backToSessions">Retour aux séances</button>
            <div style="height:.75rem"></div>
            <div class="pill-row">
              <span class="pill good">${session.exercises.length} exercices</span>
              <span class="pill">${session.duration}</span>
            </div>
            <h1>${session.name}</h1>
          </div>
          <p>${session.note}</p>
        </section>

        <div class="section-title">
          <h2>Exercices</h2>
          <span class="fine">Poids · reps · séries</span>
        </div>

        <section class="grid">
          ${session.exercises.map(item => {
            const entry = entryFor(item);
            return `
              <article class="exercise">
                <div class="exercise-head">
                  <div>
                    <strong>${item.name}</strong>
                    <p class="fine">Fourchette recommandée : ${item.repRange}</p>
                  </div>
                </div>
                <div class="fields">
                  <label>Poids
                    <input data-exercise="${item.id}" data-field="weight" value="${escapeHtml(entry.weight)}">
                  </label>
                  <label>Reps
                    <input data-exercise="${item.id}" data-field="reps" value="${escapeHtml(entry.reps)}">
                  </label>
                  <label>Séries
                    <input value="${item.sets}" readonly aria-label="Nombre de séries">
                  </label>
                </div>
              </article>
            `;
          }).join("")}
        </section>

        <div class="actions">
          <button class="btn" type="button" id="saveWorkout">Sauvegarder la séance</button>
        </div>
      `;
    }

    function bindSessionEvents() {
      document.querySelectorAll("[data-select-session]").forEach(button => {
        button.addEventListener("click", () => selectSession(button.dataset.selectSession));
      });

      document.querySelector("#backToSessions")?.addEventListener("click", () => {
        data.selectedSessionId = "";
        data.currentEntries = {};
        saveData();
        renderAll();
      });

      document.querySelectorAll("[data-exercise]").forEach(input => {
        input.addEventListener("input", event => {
          const id = event.currentTarget.dataset.exercise;
          const field = event.currentTarget.dataset.field;
          if (!data.currentEntries[id]) data.currentEntries[id] = {};
          data.currentEntries[id][field] = event.currentTarget.value;
          saveData();
        });
      });

      document.querySelector("#saveWorkout")?.addEventListener("click", saveWorkout);
    }

    function renderProgress() {
      const stats = getProgressStats();
      document.querySelector("#view-progress").innerHTML = `
        <section class="hero">
          <div>
            <div class="pill-row">
              <span class="pill good">${data.history.length} séance${data.history.length > 1 ? "s" : ""}</span>
              <span class="pill">${stats.exerciseCount} exercice${stats.exerciseCount > 1 ? "s" : ""} suivis</span>
            </div>
            <h1>Progression</h1>
          </div>
          <p>Lecture simple : dernière performance, meilleure charge notée, et évolution depuis la première séance enregistrée.</p>
        </section>

        ${data.lastSavedAt ? `<section class="notice" style="margin-top:1rem">Dernière séance sauvegardée : ${new Date(data.lastSavedAt).toLocaleString("fr-FR")}.</section>` : ""}

        <div class="section-title">
          <h2>Résumé</h2>
          <span class="fine">LocalStorage</span>
        </div>
        <section class="summary">
          <div class="stat"><small>Séances</small><strong>${data.history.length}</strong></div>
          <div class="stat"><small>Dernière</small><strong>${data.history[0]?.sessionName || "-"}</strong></div>
          <div class="stat"><small>Volume max</small><strong>${stats.bestVolume ? Math.round(stats.bestVolume) : "-"}</strong></div>
        </section>

        <div class="section-title">
          <h2>Par exercice</h2>
          <span class="fine">Plus lisible</span>
        </div>
        <section class="grid progress-grid">
          ${stats.exercises.length ? stats.exercises.map(renderExerciseProgress).join("") : `<div class="empty">Aucune séance sauvegardée pour le moment. Va dans l’onglet Séance, choisis une séance, puis appuie sur “Sauvegarder la séance”.</div>`}
        </section>

        <div class="section-title">
          <h2>Historique</h2>
          <span class="fine">Séances récentes</span>
        </div>
        <section class="card grid">
          ${data.history.length ? renderHistoryTable() : `<div class="empty">L’historique apparaîtra ici après la première sauvegarde.</div>`}
          <button class="btn secondary" type="button" id="exportData">Exporter les données</button>
          <button class="btn danger" type="button" id="resetData">Réinitialiser</button>
        </section>
      `;
      bindProgressEvents();
    }

    function getProgressStats() {
      const map = new Map();
      let bestVolume = 0;

      [...data.history].reverse().forEach(record => {
        record.exercises.forEach(item => {
          if (!map.has(item.id)) {
            map.set(item.id, {
              id: item.id,
              name: item.name,
              first: item,
              last: item,
              bestWeight: numericWeight(item.weight),
              bestVolume: 0,
              count: 0,
              records: []
            });
          }

          const current = map.get(item.id);
          const weight = numericWeight(item.weight);
          const reps = numericReps(item.reps);
          const volume = weight * reps * Number(item.sets || 0);

          current.last = item;
          current.bestWeight = Math.max(current.bestWeight, weight);
          current.bestVolume = Math.max(current.bestVolume, volume);
          current.count += 1;
          current.records.push({ date: record.date, sessionName: record.sessionName, ...item, volume });
          bestVolume = Math.max(bestVolume, volume);
        });
      });

      const exercises = [...map.values()].sort((a, b) => a.name.localeCompare(b.name, "fr"));
      return { exercises, exerciseCount: exercises.length, bestVolume };
    }

    function renderExerciseProgress(item) {
      const firstWeight = numericWeight(item.first.weight);
      const lastWeight = numericWeight(item.last.weight);
      const diff = lastWeight - firstWeight;
      const trend = diff > 0 ? `+${diff.toLocaleString("fr-FR")} kg` : diff < 0 ? `${diff.toLocaleString("fr-FR")} kg` : "stable";
      const trendClass = diff > 0 ? "good" : diff < 0 ? "warn" : "";

      return `
        <article class="card grid">
          <div class="progress-head">
            <div>
              <strong>${item.name}</strong>
              <p class="fine">${item.count} relevé${item.count > 1 ? "s" : ""}</p>
            </div>
            <span class="pill ${trendClass}">${trend}</span>
          </div>
          <div class="summary">
            <div class="stat"><small>Dernier poids</small><strong>${escapeHtml(item.last.weight)}</strong></div>
            <div class="stat"><small>Dernières reps</small><strong>${escapeHtml(item.last.reps)}</strong></div>
            <div class="stat"><small>Séries</small><strong>${item.last.sets}</strong></div>
          </div>
          <div class="notice">
            Meilleure charge notée : <strong>${item.bestWeight ? `${item.bestWeight.toLocaleString("fr-FR")} kg` : escapeHtml(item.last.weight)}</strong>.
            ${item.bestVolume ? `Meilleur volume estimé : <strong>${Math.round(item.bestVolume)}</strong>.` : ""}
          </div>
        </article>
      `;
    }

    function renderHistoryTable() {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Séance</th>
                <th>Exercices</th>
              </tr>
            </thead>
            <tbody>
              ${data.history.slice(0, 20).map(record => `
                <tr>
                  <td>${record.date}</td>
                  <td>${escapeHtml(record.sessionName)}</td>
                  <td>${record.exercises.map(item => `${escapeHtml(item.name)} : ${escapeHtml(item.weight)}, ${escapeHtml(item.reps)} reps, ${item.sets} séries`).join("<br>")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function bindProgressEvents() {
      document.querySelector("#exportData")?.addEventListener("click", () => {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `progression-sport-${today()}.json`;
        link.click();
        URL.revokeObjectURL(url);
      });

      document.querySelector("#resetData")?.addEventListener("click", () => {
        if (confirm("Réinitialiser toutes les séances sauvegardées ?")) {
          data = createDefaultData();
          saveData();
          renderAll();
        }
      });
    }

    function updateNav() {
      document.querySelectorAll(".view").forEach(view => view.classList.remove("active"));
      document.querySelector(`#view-${activeTab}`).classList.add("active");
      document.querySelectorAll(".nav-btn").forEach(button => {
        button.classList.toggle("active", button.dataset.tab === activeTab);
      });
    }

    document.querySelectorAll("[data-tab]").forEach(button => {
      button.addEventListener("click", () => {
        activeTab = button.dataset.tab;
        updateNav();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    renderAll();
  </script>
</body>
</html>
